name: docs-dev
region: ams
alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
domains:
  - domain: docs.ottu.dev
    type: PRIMARY
features:
  - buildpack-stack=ubuntu-22
ingress:
  rules:
    - component:
        name: mcp
      match:
        path:
          prefix: /mcp
    - component:
        name: mcp
      match:
        path:
          prefix: /webhook
    - component:
        name: mcp
      match:
        path:
          prefix: /seed-wallet
    - component:
        name: docs
      match:
        path:
          prefix: /
static_sites:
  - name: docs
    github:
      branch: dev
      repo: ottuco/docs
    source_dir: /
    environment_slug: node-js
services:
  - name: mcp
    github:
      branch: dev
      repo: ottuco/docs
    source_dir: /mcp-server
    environment_slug: node-js
    http_port: 3456
    health_check:
      http_path: /health
      # Bare /health used DO defaults (1s timeout, 0s initial delay), which killed
      # the instance during cold start (exit 128) and failed the whole deploy.
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 9
    instance_size_slug: apps-s-1vcpu-0.5gb
    instance_count: 1
    envs:
      - key: BASE_URL
        value: "https://docs.ottu.dev"
      - key: PORT
        value: "3456"
      - key: KSA_KEYCLOAK_CLIENT_SECRET
        scope: RUN_TIME
        type: SECRET
        value: ""
      - key: SANDBOX_KEYCLOAK_CLIENT_SECRET
        scope: RUN_TIME
        type: SECRET
        value: ""
