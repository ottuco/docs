name: docs-dev
region: ams
alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
domains:
  - domain: docs.ottu.dev
    type: PRIMARY
features:
  - buildpack-stack=ubuntu-22
ingress:
  rules:
    - component:
        name: mcp
      match:
        path:
          prefix: /mcp
    - component:
        name: mcp
      match:
        path:
          prefix: /webhook
    - component:
        name: mcp
      match:
        path:
          prefix: /seed-wallet
    - component:
        name: docs
      match:
        path:
          prefix: /
static_sites:
  - name: docs
    github:
      branch: dev
      repo: ottuco/docs
    source_dir: /
    environment_slug: node-js
    envs:
      - key: WALLET_DEMO_ENV
        scope: BUILD_TIME
        value: "ksa.ottu.dev"
      - key: WALLET_DEMO_KSA_OTTU_DEV_CONNECT_API_KEY
        scope: BUILD_TIME
        type: SECRET
        value: ""
services:
  - name: mcp
    github:
      branch: dev
      repo: ottuco/docs
    source_dir: /mcp-server
    environment_slug: node-js
    http_port: 3456
    health_check:
      http_path: /health
    instance_size_slug: apps-s-1vcpu-0.5gb
    instance_count: 1
    envs:
      - key: BASE_URL
        value: "https://docs.ottu.dev"
      - key: PORT
        value: "3456"
      - key: WALLET_DEMO_ENV
        scope: RUN_TIME
        value: "ksa.ottu.dev"
      - key: WALLET_DEMO_KSA_OTTU_DEV_KEYCLOAK_CLIENT_SECRET
        scope: RUN_TIME
        type: SECRET
        value: ""
