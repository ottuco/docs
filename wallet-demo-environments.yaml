# Public per-environment config for the wallet docs live demo.
#
# Resolution order for each secret: env var named in `secrets` → inline
# `*_default` below → "" (which surfaces as a runtime error). The inline
# defaults exist so the demo works out of the box against the dev sandbox
# without setting env vars; override per-deploy with the env vars.
# Slug convention: uppercase(env_name).replaceAll('.','_') — e.g.
# ksa.ottu.dev → KSA_OTTU_DEV.
#
# Active environment is chosen by the WALLET_DEMO_ENV env var (falls back to
# `default` below). To target a new merchant: add an entry, set its secrets,
# flip WALLET_DEMO_ENV. No code changes.

environments:
  ksa.ottu.dev:
    merchant_id: ksa.ottu.dev
    connect_base_url: https://ksa.ottu.dev
    wallet_url: https://wallet.ottu.dev
    keycloak_url: https://auth.ottu.dev
    keycloak_realm: ksa.ottu.dev
    keycloak_client_id: backend
    currency: KWD
    seed_amount: "10.000"
    session_amount: "8.000"
    pg_filter:
      plugin: e_commerce
      type: sandbox
      tags: [demo]
      payment_services: [wallet]
    secrets:
      connect_api_key: WALLET_DEMO_KSA_OTTU_DEV_CONNECT_API_KEY
      keycloak_client_secret: WALLET_DEMO_KSA_OTTU_DEV_KEYCLOAK_CLIENT_SECRET
    # Public dev-sandbox key — same leak model as SANDBOX_AUTH_KEY in
    # src/utils/sandbox.ts. The Keycloak client secret intentionally has no
    # inline default (more sensitive); set the env var for wallet seeding.
    connect_api_key_default: "uUjUqczM.P5PqlXx8zyuFUQVk19PLxfHBZu8rG4Uy"

  sandbox.ottu.net:
    merchant_id: sandbox.ottu.net
    connect_base_url: https://sandbox.ottu.net
    wallet_url: https://wallet.ottu.net     # TBD — wallet not yet on prod sandbox
    keycloak_url: https://auth.ottu.net     # TBD
    keycloak_realm: sandbox.ottu.net        # TBD
    keycloak_client_id: backend
    currency: KWD
    seed_amount: "10.000"
    session_amount: "8.000"
    pg_filter:
      plugin: e_commerce
      type: sandbox
      tags: [demo]
      payment_services: [wallet]
    secrets:
      connect_api_key: WALLET_DEMO_SANDBOX_OTTU_NET_CONNECT_API_KEY
      keycloak_client_secret: WALLET_DEMO_SANDBOX_OTTU_NET_KEYCLOAK_CLIENT_SECRET

default: ksa.ottu.dev
