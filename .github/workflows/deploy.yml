name: Deploy to DigitalOcean

on:
  push:
    branches: [dev]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - dev
          - production

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.6"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Test MCP + Webhook server
        run: |
          cd mcp-server
          npm install
          npm test

      - name: Generate API docs
        run: npm run gen-api

      - name: Build
        run: npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger DigitalOcean App Platform Deployment
        run: |
          # Auto-deploy: push to dev → dev environment
          # Manual: workflow_dispatch → selected environment
          if [ "${{ github.event_name }}" == "push" ]; then
            APP_ID="${{ secrets.DO_APP_ID_DEV }}"
            ENV="dev"
          elif [ "${{ inputs.environment }}" == "production" ]; then
            APP_ID="${{ secrets.DO_APP_ID_PROD }}"
            ENV="production"
          else
            APP_ID="${{ secrets.DO_APP_ID_DEV }}"
            ENV="dev"
          fi

          echo "Deploying to $ENV environment..."

          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.digitalocean.com/v2/apps/${APP_ID}/deployments" \
            --fail-with-body

      - name: Deployment Triggered
        run: echo "Deployment triggered successfully"
