# Dependabot configuration.
# Groups all npm updates per ecosystem into a single PR so security/version
# bumps arrive batched instead of one PR per package. Two ecosystems: the
# Docusaurus site at the repo root and the mcp-server backend.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      npm-root:
        patterns:
          - "*"
    commit-message:
      prefix: "build(deps)"
    # docusaurus-plugin-mcp-server is upgraded manually: its FlexSearch index
    # config must be kept in sync between docusaurus.config.ts (build) and
    # mcp-server/server.mjs (runtime), and the wrong defaults OOM the mcp
    # service on deploy. Auto-bumps would ship that mismatch unattended.
    ignore:
      - dependency-name: "docusaurus-plugin-mcp-server"
      # docusaurus-theme-openapi-docs is swizzled (src/theme/Schema, SchemaItem,
      # RequestSchema, ResponseSchema, ApiExplorer/*). Minor bumps change its
      # internal API and break our swizzled components — e.g. 5.1.0 emptied
      # translationIds, breaking Request/ResponseSchema. Upgrade manually with
      # swizzle reconciliation, and keep its sibling plugin in lockstep.
      - dependency-name: "docusaurus-theme-openapi-docs"
      - dependency-name: "docusaurus-plugin-openapi-docs"

  - package-ecosystem: "npm"
    directory: "/mcp-server"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      npm-mcp-server:
        patterns:
          - "*"
    commit-message:
      prefix: "build(deps)"
    # See note above — manual upgrades only for this package.
    ignore:
      - dependency-name: "docusaurus-plugin-mcp-server"
