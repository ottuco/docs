        include_sdk_setup_preload:
          type: boolean
          writeOnly: true
          default: false
          description: Set this to true to include the 'sdk_setup_preload_payload' payload in the API response. This payload is only generated and added when this parameter is explicitly set to true. By default, it is false and the 'sdk_setup_preload_payload' payload will not be included.
        initiator_id:
          type: integer
          title: initiator
          description: The user who initiated the creation of this payment transaction, if available. This field is optional and may be used to track who created the payment transaction. Note that if the payment transaction was using API Key auth initiator_id can be set to any value that corresponds to an existing ACTIVE user in the system
        invoice_id:
          type: integer
          readOnly: true
        language:
          enum:
            - en
            - ar
          type: string
          x-spec-enum-id: ac1757d67890d125
          default: en
          description: |-
