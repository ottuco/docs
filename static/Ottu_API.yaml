          type: string
          format: decimal
          title: Shipping Excl. Tax
          description: The cost of shipping for the invoice, excluding taxes.
        shipping_incl_tax:
          type: string
          format: decimal
          title: Shipping Incl. Tax
          description:
            The cost of shipping for the invoice, including all applicable
