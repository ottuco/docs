  /b/checkout/api/sdk/v1/csuc_sdk/pay/{session_id}/{pg_code}/:
    post:
      operationId: csuc_payment_execution
      description:
        "This endpoint executes a Click to Pay payment through Cybersource
        Unified Checkout using the transient token generated by the frontend widget.
        \n\n**Flow Summary**:\n1. **Initialize Base Handler**: Retrieves `PaymentTransaction`
        by `session_id`\n   - Validates that exactly one transaction exists (no duplicates)\n
        \  - Raises error if transaction not found or multiple found\n2. **Initialize
        Click to Pay Handler**: Validates transaction and creates payment attempt\n
        \  - Checks transaction validity using `is_valid_for_payment()`\n   - Creates
        new payment attempt or retrieves latest on condition failure\n3. **Process
        Payment**: Sends authorization request to Cybersource\n   - Extracts `transient_token`
        from `funding_source`\n   - Builds payment payload with:\n     * Client reference
        information (order reference number)\n     * Processing information (capture=True
        for auto-capture, commerce_indicator='internet')\n     * Order information
        (amount, currency)\n     * Token information (transient token JWT)\n   - Calls
        Cybersource Payments API for authorization\n4. **Handle Response**: Processes
        payment gateway response\n   - Saves transaction ID and decoded token to payment
        attempt data\n   - Updates payment attempt state based on response status\n
        \  - Triggers payment state machine transitions\n5. **Generate Response**:
        Prepares standardized SDK response\n   - Generates redirect URL using `get_standard_redirect_url()`\n
        \  - Returns success/failure response with transaction details\n\n\n**Payment
        Processing Details**:\n- **Operation Type**: Determined by MID configuration
        (CAPTURE or AUTH)\n- **Auto-Capture**: Enabled by default (`capture: True`
        in processing_information)\n- **Commerce Indicator**: Set to 'internet' for
        online transactions\n- **Decision Manager**: Enabled based on MID configuration
        for fraud detection\n\n\n**Request Parameters**:\n- `pg_code`: Payment gateway
        MID code (validated to support Click to Pay)\n- `session_id`: Payment transaction
        session ID\n- `funding_source`: Contains the transient token JWT from Cybersource
        widget\n\n\n**Response Handling**:\n- **Success (200)**: Payment authorized,
        returns redirect URL and transaction details\n- **Failure**: Returns error
        message with attempt details\n- Payment attempt state automatically updated
        based on Cybersource response\n\n\n**Error Handling**:\n- Invalid or missing
        `session_id`: Returns 400 with appropriate error\n- Multiple transactions
        for same session: Returns 400 error\n- Transaction not valid for payment:
        Returns 400 with validation error\n- Cybersource API errors: Returns 400 with
        gateway error message\n- Payment attempt state conflicts handled by FSM (Finite
        State Machine)\n\n\n**Security Considerations**:\n- Transient tokens are single-use
        and expire quickly\n- Transaction IDs saved for audit and follow-up operations
        (void, capture, refund)\n- All payment data encrypted and logged via `@log_io`
        decorator\n- Silent signals prevent duplicate webhook notifications during
        processing\n\n\n**Data Saved to Payment Attempt**:\n- `transaction_id`: Cybersource
        transaction ID for subsequent operations\n- `transient_token`: The JWT token
        used for payment (for audit)\n- `transient_decoded_token`: Decoded token payload
        (for debugging)\n- `form_of_payment`: Gateway name (CSUC)\n"
      summary: Execute CSUC Payment
      parameters:
        - in: path
          name: pg_code
          schema:
            type: string
          required: true
        - in: path
          name: session_id
          schema:
            type: string
          required: true
      tags:
        - Checkout SDK
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CSUCPayment"
            examples:
              CSUCPaymentRequest:
                value:
                  pg_code: CSUC_KWT_001
                  session_id: abc123def456ghi789
                  funding_source:
                    transient_token: eyJraWQiOiJ6dSIsImFsZyI6IlJTMjU2In0...
                summary: CSUC Payment Request
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/CSUCPayment"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CSUCPayment"
        required: true
      security:
        - basicAuth: []
        - tokenAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchemaWebhook"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CSUCPaymentFailureResponse"
          description: ""
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericErrorMessage"
          description: ""
  /b/checkout/api/sdk/v1/csuc_sdk/submit/{session_id}/{pg_code}/:
    post:
      operationId: csuc_payment_config_generation
      description:
        "This endpoint initializes the Cybersource Unified Checkout (CSUC)
        payment flow by generating and returning the capture context token and associated
        configuration. \n\n**Flow Summary**:\n1. **Validate Inputs**: The `pg_code`
        and `session_id` are validated to ensure:\n   - The MID exists and supports
        Click to Pay payment method\n   - The payment transaction exists and is valid
        for payment\n2. **Retrieve Transaction**: Fetches the `PaymentTransaction`
        using `session_id`\n3. **Create/Reuse Payment Attempt**: Either creates a
        new payment attempt or reuses the latest one\n4. **Generate Capture Context**:
        Calls Cybersource API to create a capture context JWT token containing:\n
        \  - Allowed card networks and payment types\n   - Client version and locale
        settings\n   - Billing, shipping, and email capture mandates\n   - Transaction
        amount and currency\n   - Decision manager configuration\n5. **Parse Token**:
        Decodes the JWT to extract SDK client configuration:\n   - JavaScript SDK
        URL and integrity hash\n   - Payment form submission URL\n6. **Cache & Return**:
        Caches the complete response (10 min TTL) and returns configuration\n\n\n**Capture
        Context Caching**:\n- Capture contexts are cached using key: `{mid_code}_{session_id}_ctp_context`\n-
        Cache TTL: 600 seconds (10 minutes)\n- Subsequent requests with same session
        reuse cached context\n\n\n**Response Structure**:\n- `sdk_client`: Contains
        the Cybersource JS SDK URL, SRI integrity hash, and CORS settings\n- `form_config`:
        Specifies the payment execution endpoint URL and form parameters\n- `capture_context`:
        JWT token to initialize the checkout widget\n\n\n**Typical Use Case**:\n-
        Called by frontend before rendering the Cybersource payment widget\n- The
        frontend loads the SDK from `sdk_client.src` with integrity verification\n-
        The `capture_context` is passed to Cybersource's JavaScript SDK\n- After user
        completes payment, the widget generates a transient token\n- Frontend submits
        transient token to `form_config.action` URL\n\n\n**Integration Steps**:\n1.
        Frontend calls this endpoint with `pg_code` and `session_id`\n2. Backend generates/retrieves
        capture context from Cybersource\n3. Frontend dynamically loads the JS SDK
        using `sdk_client` configuration\n4. Frontend initializes Cybersource widget
        with `capture_context`\n5. User completes payment in Cybersource widget\n6.
        Frontend receives transient token from widget\n7. Frontend POSTs transient
        token to `form_config.action` URL\n"
      summary: Initialize CSUC Payment Flow
      parameters:
        - in: path
          name: pg_code
          schema:
            type: string
          required: true
        - in: path
          name: session_id
          schema:
            type: string
          required: true
      tags:
        - Checkout SDK
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitClickToPay"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/SubmitClickToPay"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/SubmitClickToPay"
        required: true
      security:
        - basicAuth: []
        - tokenAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CSUCSubmitSuccessResponse"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CSUCSubmitFailureResponse"
          description: ""
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericErrorMessage"
          description: ""
  /b/checkout/api/sdk/v1/doku_sdk/submit/{session_id}/{pg_code}/:
    post:
      operationId: ctp_payment_config_generation
      description:
        "This endpoint initializes the doku payment flow by provisioning
        the required SDK configuration for the frontend to launch the appropriate
        checkout widget. \nIt is used at the beginning of the payment journey to fetch
        the necessary JS SDK URLs,\ncapture tokens, form attributes, and other metadata
        specific to the payment provider.\n**Flow Summary**:\n1. **Validate Inputs**:
        The `pg_code` and `session_id` are validated via the serializer.\n2. **Locate
        Transaction**: Retrieves the payment transaction using the `session_id`.\n3.
        **Setup Context**: Resolves the merchant identity and loads configuration.\n4.
        **Provision SDK**: Calls the payment gateway's `get_vendor_sdk_config()` to
        receive SDK metadata.\n5. **Respond**: Returns the configuration as a unified
        structure to be consumed by the frontend.\n**Typical Use Case**:\n- Used by
        the frontend to prepare a Click to Pay UI (e.g., DOKU, CSUC).\n- Useful requires
        an initial context/token.\n"
      summary: Submit Doku
      parameters:
        - in: path
          name: pg_code
          schema:
            type: string
          required: true
        - in: path
          name: session_id
          schema:
            type: string
          required: true
      tags:
        - Checkout SDK
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitClickToPay"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/SubmitClickToPay"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/SubmitClickToPay"
        required: true
      security:
        - basicAuth: []
        - tokenAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClickToPaySubmitSuccessResponse"
          description: ""
        "400":
          content:
            application/json:
