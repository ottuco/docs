        `CheckoutSerializer`. It provides methods for creating invoices, invoice items, and transactions.
      properties:
        currency_code:
          type: string
          description:
            The specified currency represents the denomination of the transaction.Nevertheless,
            it doesn't necessarily mandate payment in this exact currency.Due to potential
            currency conversions or exchanges, the final charge may be in a different
            currency.
        due_date:
          type: string
          format: date
          description:
            The date by which the customer is expected to make payment
            for the invoice.
