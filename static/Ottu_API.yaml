        transactionId:
          type: string
          description: Unique transaction identifier
      required:
        - publicKeyHash
        - transactionId
    ApplePayInstrument:
      type: object
      description: Apple Pay payment instrument
      properties:
        instrument_type:
          enum:
            - apple_pay
          type: string
          x-spec-enum-id: 49c50763123c8d7e
          default: apple_pay
          description: |-
            Payment type: Apple Pay

            * `apple_pay` - apple_pay
        payload:
          allOf:
            - $ref: "#/components/schemas/ApplePayPayloadSchema"
          description: Apple Pay payment token received from Apple Pay SDK. Pass the complete token object exactly as received without modification. Includes paymentData (encrypted), paymentMethod details, and transactionIdentifier.
      required:
        - payload
    ApplePayPayloadSchema:
      type: object
      description: Complete Apple Pay token structure
      properties:
        paymentData:
          allOf:
            - $ref: "#/components/schemas/ApplePayPaymentDataSchema"
          description: Encrypted payment data
        paymentMethod:
          allOf:
            - $ref: "#/components/schemas/ApplePayPaymentMethodSchema"
          description: Payment method information
        transactionIdentifier:
          type: string
          description: Apple Pay transaction identifier
      required:
        - paymentData
        - paymentMethod
        - transactionIdentifier
    ApplePayPaymentDataSchema:
      type: object
      description: Encrypted Apple Pay payment data
      properties:
        version:
          type: string
          description: Token version (e.g., 'EC_v1')
        data:
          type: string
          description: Encrypted payment data
        signature:
          type: string
          description: Signature of the payment data
        header:
          allOf:
            - $ref: "#/components/schemas/ApplePayHeaderSchema"
          description: Cryptographic header
      required:
        - data
        - header
        - signature
        - version
    ApplePayPaymentMethodSchema:
      type: object
      description: Apple Pay payment method details
      properties:
        displayName:
          type: string
          description: Display name (e.g., 'Visa 1234')
        network:
          type: string
          description: Card network (e.g., 'Visa')
        type:
          type: string
          description: Card type (e.g., 'debit')
      required:
        - displayName
        - network
        - type
    ApplePayToken:
      type: object
      properties:
        paymentData:
          allOf:
            - $ref: "#/components/schemas/ApplePaymentData"
          description: Encrypted Apple Pay payment data containing the payment amount, merchant ID, and other transaction details. This payload is decrypted by the payment gateway to complete the transaction.
        paymentMethod:
          allOf:
            - $ref: "#/components/schemas/PaymentMethod"
          description: Describes the payment method selected by the customer, including card network (e.g., Visa), type (e.g., debit), and display name.
        transactionIdentifier:
          type: string
      required:
        - paymentData
        - paymentMethod
        - transactionIdentifier
    ApplePaymentData:
