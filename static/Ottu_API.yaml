    Agreement:
      type: object
      description: |-
        Serializer to hold the recurring data information.
        This is required for being able to create recurring payments and the PGs
        require this information.
      properties:
        id:
          type: string
          description:
            "A unique identifier for the agreement established with the
            payer. This ID links to the specific terms and conditions the payer has
            authorized for processing their stored card details. Use cases include:
            \n1. Recurring Payments: Periodic debits, e.g., gym memberships. \n2.
            Installment Payments: Multiple charges for a single purchase over time.
            \n3. Unscheduled: Future payments as required, e.g., account top-ups.
            \n4. Industry Practice: Standard business practices related to an original
            payment, e.g., hotel charges after checkout."
          maxLength: 128
        amount_variability:
          enum:
            - fixed
            - variable
          type: string
          x-spec-enum-id: 559f7896c94c0925
          description: |-
            Indicates if all payments within the agreement use the same amount or if the amount differs between the payments.

            * `fixed` - Fixed
            * `variable` - Variable
        start_date:
          type: string
          format: date
          description:
            Date on which the agreement with the payer to process payments
            starts.
        expiry_date:
          type: string
          format: date
          description:
            Date on which your agreement with the payer to process payments
            expires.
        max_amount_per_cycle:
          type: string
          format: decimal
          description:
            The maximum amount for a single payment in the series as agreed
            with the payer.
        cycle_interval_days:
          type: integer
          maximum: 366
          minimum: 1
          description:
            The minimum number of days between payments agreed with the
            payer.
        total_cycles:
          type: integer
          maximum: 999
          minimum: 1
          description:
            The number of merchant-initiated payments within the recurring
            payment agreement.
        frequency:
          enum:
            - irregular
            - daily
            - weekly
            - semi_monthly
            - monthly
            - quarterly
            - semi_annually
            - yearly
            - other
          type: string
          x-spec-enum-id: f7d3278be09218f0
          description: |-
            The frequency of the payments within the series as agreed with the payer.

            * `irregular` - Irregular
            * `daily` - Daily
            * `weekly` - Weekly
            * `semi_monthly` - Semi Monthly
            * `monthly` - Monthly
            * `quarterly` - Quarterly
            * `semi_annually` - Semi Annually
            * `yearly` - Yearly
            * `other` - Other
        type:
          enum:
            - event_based
            - installment
            - recurring
            - unscheduled
            - other
          type: string
          x-spec-enum-id: a78a057f002d8a8c
          default: recurring
          description:
            "The type of commercial agreement that the payer has with the
            merchant.\n\n *Note*: For `unscheduled` agreements, the allowed values
            should be configured as follows: \n\n `id` - Accepts any value. \n\n `frequency`.
            \n\n `type`.\n\n This configuration ensures that only specific values
            are permitted for each field when the `type` is `Unscheduled`.\n\n *Note*:
            For `recurring` agreements, the following fields are mandatory as follows:
            \n\n `amount_variability` \n\n `cycle_interval_days` \n\n `expiry_date`
            \n\n ` `requency` \n\n `id` \n\n  `total_cycles` \n\n This configuration
            ensures that the required values are mandatory for each field when the
            `type` is `Recurring`.\n\n* `event_based` - Event Based\n* `installment`
            - Installment\n* `recurring` - Recurring\n* `unscheduled` - Unscheduled\n*
            `other` - Other"
        seller:
          allOf:
            - $ref: "#/components/schemas/AgreementSeller"
          description:
            Details about the retailer, if the agreement is for installment
            payments.
    AgreementSeller:
      type: object
      properties:
        name:
          type: string
          description: The retailer's trading name.
          maxLength: 128
        short_name:
          type: string
          description:
            Abbreviation of the retailer's trading name, suitable for payer's
            statement display.
          maxLength: 64
        category_code:
          type: string
          description:
            A 4-digit code classifying the retailer's business by the type
            of goods or services it offers.
          maxLength: 64
