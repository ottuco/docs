    ChannelSpecificNotification:
      type: object
      description: This serializer class is solely for API documentation purposes.
      properties:
        template_id:
          type: string
          description: This field is required. It specifies the template to be used for the notification.
        to:
          type: string
          description: Required for all notifications. Must be a valid email address for email notifications, and a valid international phone number for SMS and WhatsApp notifications.
        unit_config:
          type: integer
          description: This field is optional for SMS and email notifications, but it is mandatory for WhatsApp notifications.
        language:
          enum:
            - en
            - ar
          type: string
          x-spec-enum-id: ac1757d67890d125
          default: en
          description: |-
            Specifies the language for email, SMS, and WhatsApp notifications. The default language is English (en).

            * `en` - English
            * `ar` - Arabic
        cc:
          type: array
          items:
            type: string
            format: email
          description: This field is optional. When provided, it specifies the list of CC recipients for the email notification.
        bcc:
          type: array
          items:
            type: string
            format: email
          description: This field is optional. When provided, it specifies the list of BCC recipients for the email notification.
        subject:
          type: string
          description: This field is optional. Use this field to customize the email subject if you don't want to use the one from the template.
        body:
          type: string
          description: "{'This field is optional. If provided, it serves as a fallback template in case the primary template fails to render. This has to be a plain text body of the email.'}"
        context:
          description: This field is optional. If provided, the context data will be passed to the template engine during rendering.
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/Attachment"
          description: This field is optional. Use this field to include file attachments with your email notification. Provide the file data as a base64 encoded string *or* a publicly accessible URL.
        trace_id:
          type: string
          description: This field is optional. A unique identifier for tracking the notification request. Useful for logging and debugging.
          maxLength: 60
        tags:
          type: array
          items:
            type: string
          description: This field is optional. A list of metadata tags for analytics or categorization purposes.
      required:
        - template_id
        - to
    Checkout:
      type: object
      description: |-
        Serializer to work with PaymentTransaction instances.

        Also uses request data from other serializers to save into PaymentTransaction db table:
      properties:
        amount:
          type: string
          format: decimal
          description: Represents the total amount of the payment transaction, which includes the cost of the purchased items or services but excludes any additional fees or charges
        currency_code:
          type: string
          description: The specified currency represents the denomination of the transaction.Nevertheless, it doesn't necessarily mandate payment in this exact currency.Due to potential currency conversions or exchanges, the final charge may be in a different currency.
        pg_codes:
          type: array
          items:
            type: string
          title: Gateway
          description: The list of payment gateway codes from which a customer can select to perform the payment or authorization.
        type:
          enum:
            - e_commerce
            - payment_request
          type: string
          x-spec-enum-id: ad398830c7970f0a
          description: |-
            The type of the payment transaction. This field represents the purpose of the payment and can be one of several pre-defined choices.

            * `e_commerce` - Ecommerce
            * `payment_request` - Payment Request
        billing_address:
          $ref: "#/components/schemas/Address"
        shipping_address:
          $ref: "#/components/schemas/ShippingAddress"
        agreement:
          allOf:
            - $ref: "#/components/schemas/Agreement"
          description: |-
            An established contractual arrangement with the payer, which authorizes you to securely store and subsequently utilize their payment information for specific purposes. This could encompass arrangements like recurring payments for services such as mobile subscriptions, installment-based payments for purchases, arrangements for ad-hoc charges like account top-ups, or for standard industry practices like penalty charges for missed appointments. 

            Note: If your intention is solely to store payment details for transactions initiated by the payer in the future, then this parameter group should not be used.
        attachment:
          type: string
          format: uri
          description: "A writable field that accepts an attachment file to be included in email notifications sent to the customer regarding their payment, and also be available for download on the checkout page. This field may be used to provide the customer with additional information or documentation related to their purchase. The value of this field should be a file object. Upon successful submission, the API will return the URL for downloading the attached file. "
        attachment_short_url:
          type: string
          format: uri
          readOnly: true
          description: A short URL that links to the attachment associated with this payment. This URL may be included in email/sms notifications sent to the customer regarding their payment or displayed on the checkout page to allow the customer to easily access the attachment.
        attachment_upload_url:
          type: string
          description: A writable field that accepts an attachment that has already been uploaded to the server.
          pattern: (?:pdf|jpeg|png|doc|docx|jpg|xls|xlsx|txt)$
        billing:
          type: string
          readOnly: true
          description: Detailed billing information including formatted amounts for display and raw values for processing. Contains both the total transaction amount and any applicable fees with their respective currency codes and labels.
        card_acceptance_criteria:
          allOf:
            - $ref: "#/components/schemas/CardAcceptanceCriteria"
          description: |-
            This field allows you to define specific rules and conditions that a card must meet to be eligible for payment. These stipulations apply regardless of whether a customer chooses to pay using a saved card or opts to add a new card for the transaction. By leveraging the `card_acceptance_criteria`, you gain the power to fine-tune your payment processing strategy, tailoring acceptance rules to align with your business needs, security standards, and risk management policies.

            **Example**: If you run an exclusive service that caters predominantly to premium customers, you might set criteria that only allow transactions from high-tier credit cards like VISA Platinum. This ensures that payments align with the exclusivity and branding of your services. Remember to configure these criteria thoughtfully. Striking the right balance between security, risk mitigation, and user experience is paramount.

            **Note**: The `card_acceptance_criteria` field is applicable only for direct payments and not for hosted session payments.
        checkout_page_url:
          type: string
          format: uri
          readOnly: true
          description: Frontend Checkout Url.
          maxLength: 2000
        checkout_short_url:
          type: string
          format: uri
          readOnly: true
          description: A short URL link that, when opened, redirects to the checkout page for this payment. This URL may be shared with the customer to allow them to easily access and complete the payment. This field is only available if the `shortify_checkout_url` field is set to True.
        checkout_url:
          type: string
          format: uri
          readOnly: true
          description: URL that directs the customer to the Ottu Checkout Page where they can see the payment details and available payment methods for the transaction. If you need to share the payment link over SMS or WhatsApp, use `checkout_short_url` instead.
        customer_birthdate:
          type: string
          format: date
          title: Customer Date of Birth
          description: Customer's date of birth in YYYY-MM-DD format.This field can be used for age verification or compliance purposes during payment processing.
        customer_email:
          type: string
          format: email
          description: The email address of the customer that is used to send payment notifications and receipts, and can be used for fraud prevention. This field is mandatory and is always sent to the payment gateway. It may also be included in the invoice, receipt, email, and displayed on the payment page.
          maxLength: 128
        customer_first_name:
          type: string
          description: The first name of the recipient of the payment. This field is used for various communications such as the invoice, receipt, email, SMS, or displayed on the payment page. It may also be sent to the payment gateway if necessary.
          maxLength: 64
        customer_id:
          type: string
          description: The customer ID is a unique identifier for the customer within the merchant's system. It is also used as a merchant identifier for the customer and plays a critical role in tokenization. All the customer's cards will be associated with this ID.
          maxLength: 64
        customer_last_name:
          type: string
          description: The last name of the recipient of the payment. This field is used for various communications such as the invoice, receipt, email, SMS, or displayed on the payment page. It may also be sent to the payment gateway if necessary.
          maxLength: 64
        customer_phone:
          type: string
          description: Customer phone number associated with the payment. This might be sent to the payment gateway and depending on the gateway, it may trigger a click to pay process on the payment page. The phone number will also be included in the invoice, receipt, email, and displayed on the payment page.
          maxLength: 16
        customer_phone_2:
          type: string
          title: Customer additional phone
          description: The customer's additional phone number, if any. This field can be updated by the customer on the payment page or in the Checkout SDK.
          maxLength: 16
        due_datetime:
          type: string
          format: date-time
          title: Due date and time
          description: The date and time by which the payment is due. This field may be used to help remind the customer to complete the payment before the due date.
        email_recipients:
          type: array
          items:
            type: string
            format: email
          description: A comma-separated list of email addresses for internal recipients who will receive customer emails. These recipients will be included in email notifications sent to the customer regarding their payment.
        expiration_time:
          type: string
          description: If defined, any payment transactions created more than the specified period of time ago will be invalidated or expired if the customer attempts to complete them. By default, this expiration period is set to 24 hours from the time of transaction creation. This feature helps ensure that payment transactions are processed promptly.
        generate_qr_code:
          type: boolean
          writeOnly: true
          default: false
          description: If set to true, the `qr_code_url` field will be present in the response. Upon scanning it, the customer will be redirected to the checkout_url, which is the Ottu Checkout page.
        include_sdk_setup_preload:
          type: boolean
          writeOnly: true
          default: false
          description: Set this to true to include the 'sdk_setup_preload_payload' payload in the API response. This payload is only generated and added when this parameter is explicitly set to true. By default, it is false and the 'sdk_setup_preload_payload' payload will not be included.
        initiator_id:
          type: integer
          title: initiator
          description: The user who initiated the creation of this payment transaction, if available. This field is optional and may be used to track who created the payment transaction. Note that if the payment transaction was using API Key auth initiator_id can be set to any value that corresponds to an existing ACTIVE user in the system
        language:
          enum:
            - en
            - ar
          type: string
          x-spec-enum-id: ac1757d67890d125
          default: en
          description: |-
            This field specifies the language to be used for communication with the customer, including the payment page, receipt, invoice, email, SMS, and any other communications related to the payment transaction.

            * `en` - English
            * `ar` - Arabic
        notifications:
          allOf:
            - $ref: "#/components/schemas/Notifications"
          title: Notification settings
          description: A JSON field that contains the notification settings for this payment transaction, including SMS and email notifications, as well as the events for which they will be sent (e.g., 'created', 'paid', 'refund', 'canceled', etc.). This field may be used to configure and customize the notifications sent to customers and internal recipients throughout the payment process.
        operation:
          type: string
          readOnly: true
          description: Specifies the type of operation to be performed by the payment gateway. If set to `purchase`, the payment source will be directly charged. If set to `authorize`, the payment source will only be authorized and the actual charge will be made at a later time.
        order_no:
          type: string
          description: The unique identifier assigned to this payment transaction. It is used for tracking purposes and is set by the merchant or the system.
          maxLength: 128
        payment_instrument:
          $ref: "#/components/schemas/PaymentInstrument"
        payment_methods:
          allOf:
            - $ref: "#/components/schemas/PaymentMethodsForRedirect"
          readOnly: true
          description: An array containing all the payment methods derived from the `pg_codes` input. Each object in the array contains information about a single payment gateway, including its icon and the `redirect_url` that will redirect the customer to the payment gateway's payment page.
        payment_type:
          enum:
            - one_off
            - auto_debit
            - save_card
          type: string
          x-spec-enum-id: b2ae60f7918918e7
          default: one_off
          description: |-
            Type of payment. Choose `one_off` for payments that occur only once without future commitments. Choose `auto_debit` for payments that are automatically deducted, such as recurring subscriptions, installments, or unscheduled auto-debits. 

            Choose `save_card` if you want to perform a card tokenization operation.

            NOTE: If `auto_debit` is selected: 
            1. `agreement` and `customer_id` parameters will also be mandatory. 
            2. Only PG codes supporting tokenization can be selected. 
            As a side effect, the card used for the payment will be associated with the supplied `agreement.id`. This card will be locked, preventing the customer from deleting it from the system until an alternate card is chosen for auto-debit payments.

            NOTE: If `save_card` is selected: 
            1. The amount must be zero for the save card operation. 
            2. The selected MID(pg_code) must support tokenization to enable the save card operation. 
            3. Please note that the save card operation is considered successful without any funds being charged.
            4. Once a card is created, Ottu will send a webhook containing the card details to the merchant's webhook URL.
            5. When the transaction type is `save_card`, all previously saved cards returned in the sdk_preload_payload should be hidden since the user is saving a new card and does not need to select from existing ones.

            * `one_off` - One Off
            * `auto_debit` - Auto Debit
            * `save_card` - Save Card
        preload_checkout_page:
          type: boolean
          writeOnly: true
          default: false
          description: Pre-populate checkout page cache on transaction creation (POST only). Improves performance when clients immediately poll for the checkout page after creation. Ignored on updates (PATCH/PUT) - cache is automatically invalidated on any update. The cache expires based on the transaction's expiration time (max 1 hour).
        product_type:
          type: string
          description: The type of product or service being purchased. This field may be used for tracking and reporting purposes.
          maxLength: 128
        qr_code_url:
          type: string
          format: uri
          readOnly: true
          description: A QR code that, when scanned, redirects to the checkout page for this payment. This QR code may be displayed on invoices, receipts, or other documents to allow customers to easily access the checkout page and make a payment. This parameter is only present when `generate_qr_code` is set to true.
        redirect_url:
          type: string
          format: uri
          description: The URL where the customer will be redirected after the payment stage only if the webhook URL returns a success status. `order_no`, `reference_number` and `session_id` will be appended to the redirect URL as query parameters.
          maxLength: 2000
        sdk_setup_preload_payload:
          allOf:
            - $ref: "#/components/schemas/CheckoutSDK"
          readOnly: true
          default: false
          description: A JSON object containing preloaded data required to initialize the checkout interface.This includes essential details such as customer information, available payment methods.and specific transaction details, all formatted according to the Checkout SDK's initialization specifications.This field streamlines the checkout process by providing necessary information upfront.enhancing user experience and efficiency.
        session_id:
          type: string
          readOnly: true
          description: A unique identifier for each payment transaction, used to maintain the session state during the payment process.
        settled_pg_code:
          type: string
          readOnly: true
          title: Final Payment Gateway
          description: The code of the payment gateway used for completing the transaction. This field indicates the specific gateway that processed and settled the payment, providing clarity on which payment service was ultimately utilized for this transaction.
        shortify_attachment_url:
          type: boolean
          writeOnly: true
          default: false
          description: If set to True, the URL of the uploaded attachment will be shortened using a URL shortener service. This should be used when sharing the attachment URL via SMS or WhatsApp.
        shortify_checkout_url:
          type: boolean
          writeOnly: true
          default: false
          description: If set to True, the checkout URL will be shortened using a URL shortener service. This should be used when sharing the payment URL via SMS or WhatsApp.
        state:
          enum:
            - created
            - pending
            - attempted
            - authorized
            - paid
            - failed
            - canceled
            - expired
            - invalided
            - refunded
            - cod
          type: string
          x-spec-enum-id: caee163196dbc11f
          readOnly: true
          description: |-
            The current state of the payment transaction, it helps to understand the progress of the payment.

            * `created` - Created
            * `pending` - Pending
            * `attempted` - Attempted
            * `authorized` - Authorized
            * `paid` - Paid
            * `failed` - Failed
            * `canceled` - Canceled
            * `expired` - Expired
            * `invalided` - Invalided
            * `refunded` - Refunded
            * `cod` - Cash on Delivery
        unit_code:
          type: string
          writeOnly: true
          title: Unit
          description: The slug of the unit to be used for the transaction.
        vendor_name:
          type: string
          description: The name of the vendor or merchant associated with this payment. This field may be used for accounting and reporting purposes.
          maxLength: 64
        webhook_url:
          type: string
          format: uri
          description: "URL where the payment result will be sent via a POST request after the customer has completed the payment session. The payment result will be included in the request body. "
          maxLength: 2000
      required:
        - amount
        - attachment_short_url
        - billing
        - checkout_page_url
        - checkout_short_url
        - checkout_url
        - currency_code
        - operation
        - payment_methods
        - pg_codes
        - qr_code_url
        - sdk_setup_preload_payload
        - session_id
        - settled_pg_code
        - state
        - type
