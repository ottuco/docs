    Agreement:
      type: object
      description: |-
        Serializer to hold the recurring data information.
        This is required for being able to create recurring payments and the PGs
        require this information.
      properties:
        id:
          type: string
          description: |-
            A unique identifier for the agreement established with the payer. This ID links to the specific terms and conditions the payer has authorized for processing their stored card details. Use cases include: 
            1. Recurring Payments: Periodic debits, e.g., gym memberships. 
            2. Installment Payments: Multiple charges for a single purchase over time. 
            3. Unscheduled: Future payments as required, e.g., account top-ups. 
            4. Industry Practice: Standard business practices related to an original payment, e.g., hotel charges after checkout.
          maxLength: 128
        amount_variability:
          enum:
            - fixed
            - variable
          type: string
          x-spec-enum-id: 559f7896c94c0925
          description: |-
            Indicates if all payments within the agreement use the same amount or if the amount differs between the payments.

            * `fixed` - Fixed
            * `variable` - Variable
        start_date:
          type: string
          format: date
          description: Date on which the agreement with the payer to process payments starts.
        expiry_date:
          type: string
          format: date
          description: Date on which your agreement with the payer to process payments expires.
        max_amount_per_cycle:
          type: string
          format: decimal
          description: The maximum amount for a single payment in the series as agreed with the payer.
        cycle_interval_days:
          type: integer
          maximum: 366
          minimum: 1
          description: The minimum number of days between payments agreed with the payer.
        total_cycles:
          type: integer
          maximum: 999
          minimum: 1
          description: The number of merchant-initiated payments within the recurring payment agreement.
        frequency:
          enum:
            - irregular
            - daily
            - weekly
            - semi_monthly
            - monthly
            - quarterly
            - semi_annually
            - yearly
            - other
          type: string
          x-spec-enum-id: f7d3278be09218f0
          description: |-
            The frequency of the payments within the series as agreed with the payer.

            * `irregular` - Irregular
            * `daily` - Daily
            * `weekly` - Weekly
            * `semi_monthly` - Semi Monthly
            * `monthly` - Monthly
            * `quarterly` - Quarterly
            * `semi_annually` - Semi Annually
            * `yearly` - Yearly
            * `other` - Other
        type:
          enum:
            - event_based
            - installment
            - recurring
            - unscheduled
            - other
          type: string
          x-spec-enum-id: a78a057f002d8a8c
          default: recurring
          description: |-
            The type of commercial agreement that the payer has with the merchant.

             *Note*: For `unscheduled` agreements, the allowed values should be configured as follows: 

             `id` - Accepts any value. 

             `frequency`. 

             `type`.

             This configuration ensures that only specific values are permitted for each field when the `type` is `Unscheduled`.

             *Note*: For `recurring` agreements, the following fields are mandatory as follows: 

             `amount_variability` 

             `cycle_interval_days` 

             `expiry_date` 

             ` `requency` 

             `id` 

              `total_cycles` 

             This configuration ensures that the required values are mandatory for each field when the `type` is `Recurring`.

            * `event_based` - Event Based
            * `installment` - Installment
            * `recurring` - Recurring
            * `unscheduled` - Unscheduled
            * `other` - Other
        seller:
          allOf:
            - $ref: "#/components/schemas/AgreementSeller"
          description: Details about the retailer, if the agreement is for installment payments.
    AgreementSeller:
      type: object
      properties:
        name:
          type: string
          description: The retailer's trading name.
          maxLength: 128
        short_name:
          type: string
          description: Abbreviation of the retailer's trading name, suitable for payer's statement display.
          maxLength: 64
        category_code:
          type: string
          description: A 4-digit code classifying the retailer's business by the type of goods or services it offers.
          maxLength: 64
    AmountDetails:
      type: object
      properties:
        currency_code:
          type: string
          readOnly: true
        amount:
          type: string
          description: Represents the total amount of the payment transaction, which includes the cost of the purchased items or services but excludes any additional fees or charges
          maxLength: 120
        total:
          type: string
          readOnly: true
          description: Denotes the comprehensive total of the payment transaction, incorporating both the principal amount and any associated fees.
        fee:
          type: string
          readOnly: true
          description: The `Fee` indicates the sum disbursed by the customer in their chosen currency for the payment. Note, this currency could vary from the currency used for the transaction.
        exchange_rate:
          type: string
          description: The conversion rate used for currency conversion during payment. This value reflects the rate locally calculated.
      required:
        - currency_code
        - fee
        - total
