        shortify_checkout_url:
          type: boolean
          writeOnly: true
          default: false
          description:
            If set to True, the checkout URL will be shortened using a
            URL shortener service. This should be used when sharing the payment URL
            via SMS or WhatsApp.
        unit_code:
          type: string
          writeOnly: true
          title: Unit
          description: The slug of the unit to be used for the transaction.
