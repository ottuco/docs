    CheckoutSDK:
      type: object
      description: |-
        Serialize data for SDK init.
        The SDK will use this data to initialize the payment process and
        to display the payment methods.
      properties:
        amount:
          type: string
          format: decimal
          description: Represents the total amount of the payment transaction, which includes the cost of the purchased items or services but excludes any additional fees or charges
        billing:
          type: string
          readOnly: true
          description: Detailed billing information including formatted amounts for display and raw values for processing. Contains both the total transaction amount and any applicable fees with their respective currency codes and labels.
        cards:
          type: array
          items:
            type: object
            additionalProperties: {}
          description: List of saved tokenized cards for customer payments, which can be used for transactions. Render alongside `payment_methods` for customers to choose from.
          readOnly: true
        customer_id:
          type: string
          description: The customer ID is a unique identifier for the customer within the merchant's system. It is also used as a merchant identifier for the customer and plays a critical role in tokenization. All the customer's cards will be associated with this ID.
          maxLength: 64
        customer_phone:
          type: string
          description: Customer phone number associated with the payment. This might be sent to the payment gateway and depending on the gateway, it may trigger a click to pay process on the payment page. The phone number will also be included in the invoice, receipt, email, and displayed on the payment page.
          maxLength: 16
        currency_code:
          type: string
          description: The specified currency represents the denomination of the transaction.Nevertheless, it doesn't necessarily mandate payment in this exact currency.Due to potential currency conversions or exchanges, the final charge may be in a different currency.
        expiration_time:
          type: string
          readOnly: true
          description: "The datetime when this payment transaction will expire. "
        language:
          enum:
            - en
            - ar
          type: string
          x-spec-enum-id: ac1757d67890d125
          default: en
          description: |-
            This field specifies the language to be used for communication with the customer, including the payment page, receipt, invoice, email, SMS, and any other communications related to the payment transaction.

            * `en` - English
            * `ar` - Arabic
        operation:
          type: string
          readOnly: true
          description: Specifies the type of operation to be performed by the payment gateway. If set to `purchase`, the payment source will be directly charged. If set to `authorize`, the payment source will only be authorized and the actual charge will be made at a later time.
        payment_type:
          enum:
            - one_off
            - auto_debit
            - save_card
          type: string
          x-spec-enum-id: b2ae60f7918918e7
          default: one_off
          description: |-
            Type of payment. Choose `one_off` for payments that occur only once without future commitments. Choose `auto_debit` for payments that are automatically deducted, such as recurring subscriptions, installments, or unscheduled auto-debits. 

            Choose `save_card` if you want to perform a card tokenization operation.

            NOTE: If `auto_debit` is selected: 
            1. `agreement` and `customer_id` parameters will also be mandatory. 
            2. Only PG codes supporting tokenization can be selected. 
            As a side effect, the card used for the payment will be associated with the supplied `agreement.id`. This card will be locked, preventing the customer from deleting it from the system until an alternate card is chosen for auto-debit payments.

            NOTE: If `save_card` is selected: 
            1. The amount must be zero for the save card operation. 
            2. The selected MID(pg_code) must support tokenization to enable the save card operation. 
            3. Please note that the save card operation is considered successful without any funds being charged.
            4. Once a card is created, Ottu will send a webhook containing the card details to the merchant's webhook URL.
            5. When the transaction type is `save_card`, all previously saved cards returned in the sdk_preload_payload should be hidden since the user is saving a new card and does not need to select from existing ones.

            * `one_off` - One Off
            * `auto_debit` - Auto Debit
            * `save_card` - Save Card
        payment_methods:
          type: array
          items: {}
          description: |
            The provided documentation describes the `payment_methods` field.

             Detailing the types of payment methods included and their functionality 
            as well as backward compatibility considerations for removed methods. 

            The `payment_methods` field includes various payment options available to customers
            excluding device-specific methods like `apple_pay`, `google_pay`and `flex_methods` represented in flex methods section
            it primarily supports methods requiring a redirect flow
            where users complete transactions on an external webpage.

            `Functionality`: users are redirected to an external 
            site mostly to gateway payment page 
            using `redirect_url` where they can complete the payment flow

            **The dynamic nature of the payment_methods**:`payment_methods` type is an array of objects 
            and it's type allows it to accommodate an unlimited variety of payment options
            as each object represents a gateway payment option but strictly associated to redirect payment flow

            **Backward Compatibility Notice:**

            `stc_pay`: 
            previous Inclusion, `stc_pay` was formerly listed within the `payment_methods` array
            it has been removed in favor of a more streamlined integration within the SDK
            similar to the approach for `payment_services`.

            **Backward Compatibility:** 

            The SDK must still support STC Pay for applications relying on older API versions.
            Although it will not appear in current and future versions
            the SDK will manage its inclusion internally

            to ensure a seamless transition and consistent user experience
            across different API versions, without disrupting existing integrations.
          readOnly: true
        payment_services:
          type: array
          items: {}
          description: |
            Dedicated to singular, prominently featured payment options

            such as `apple_pay`, `google_pay`, `samsung_pay`, `stc_pay`, etc.,
            the `payment_services` field presents these methods in a distinctive manner.

            Unlike `payment_methods`, payment services are intended to be displayed uniquely,
            Typically represented by dedicated buttons or interfaces within the payment page.

            This ensures that each payment service,
            identifiable by its unique flow ie: (`apple_pay`, `stc_pay`)
            is presented no more than once to the user
            maintaining clarity and simplicity in the payment selection process.

            **Backward Compatibility Notice**:
            historically, the availability of (`apple_pay`, `google_pay`) 
            was indicated through the `apple_pay_available` and `google_pay_available` flags
            at the root level of the API response.

            With the evolution of the API, these flags have been deprecated, 
            and the respective payment methods have been integrated into the `payment_services` array.

            Despite this restructuring, backward compatibility for these payment methods
            is preserved in the SDK to accommodate previous API versions,
            ensuring a seamless transition for existing implementations.
          readOnly: true
        flex_methods:
          type: array
          items: {}
          description: |
            The `flex_methods` field encompasses a comprehensive array
            of payment options available to customers,
            explicitly excluding device-specific methods such as `apple_pay`
            `google_pay`, redirect flow `payment_methods` and tokenized card solutions
            otherwise it represents the flexible payment methods ie:(`tamara`, `tabby`, `taly`)
            payment options that necessitate dynamic flows
            where SDK might need to fetch some `pre-payment-check` API calls then
            users are guided to an external webpage to finalize their payment transactions.

            It's important to note that the flex_methods array is dynamic
            and can accommodate an unlimited array of payment methods.
            each method listed should be individually rendered within the user interface with a separated flow.
          readOnly: true
        sdk_studio:
          type: object
          additionalProperties: {}
          description: Represents the configuration of SDK Studio configuration, which includes the available payment methods and services sdk config required by the frontend to initialize the payment SDK properly.
          readOnly: true
        response:
          type: object
          additionalProperties: {}
          description: |+
            **What is a payment gateway response?**

            A payment gateway response is the feedback received
            from payment gateway after a user has completed a payment
            this response provides information on whether the payment was successful or if it was canceled or failed.

            **When do we receive the response?**

            We receive the payment gateway response immediately after the user has made a payment
            or after n of minutes defined for a gateway inquiry request initiated by ottu core
            to fetch the transaction status after the defined time for each gateway.

            **Which attempt do we get the response for?**

            the response we provide is from the most recent payment attempt.
            this ensures that the information reflects the latest status of the transaction.

            **Structure of the response**: 

            The response structure is managed by our SDK,
            which updates the payment details and triggers one of three callbacks
            based on the status provided in the response:

            `successCallback`: Triggered if the response.status indicates a successful payment.

            `cancelCallback`: Triggered if the response.status indicates a canceled payment.

            `errorCallback`: Triggered if the response.status indicates a error payment.

          readOnly: true
        state:
          enum:
            - created
            - pending
            - attempted
            - authorized
            - paid
            - failed
            - canceled
            - expired
            - invalided
            - refunded
            - cod
          type: string
          x-spec-enum-id: caee163196dbc11f
          readOnly: true
          description: |-
            The current state of the payment transaction, it helps to understand the progress of the payment.

            * `created` - Created
            * `pending` - Pending
            * `attempted` - Attempted
            * `authorized` - Authorized
            * `paid` - Paid
            * `failed` - Failed
            * `canceled` - Canceled
            * `expired` - Expired
            * `invalided` - Invalided
            * `refunded` - Refunded
            * `cod` - Cash on Delivery
        type:
          enum:
            - e_commerce
            - payment_request
          type: string
          x-spec-enum-id: ad398830c7970f0a
          description: |-
            The type of the payment transaction. This field represents the purpose of the payment and can be one of several pre-defined choices.

            * `e_commerce` - Ecommerce
            * `payment_request` - Payment Request
        is_amount_editable:
          type: boolean
          readOnly: true
          title: Editable amount
          description: This field specifies whether the customer can modify the payment amount and choose the amount he wishes to pay.
        session_id:
          type: string
          readOnly: true
          description: A unique identifier for each payment transaction, used to maintain the session state during the payment process.
        cancel_url:
          type: string
          format: uri
          readOnly: true
          description: |
            This endpoint used to cancel the transaction using the merchant cancellation flow, 
            to ensure the transaction cannot be paid again 
            and trigger the webhook notification 
