            - $ref: "#/components/schemas/Agreement"
          description:
            "An established contractual arrangement with the payer, which
            authorizes you to securely store and subsequently utilize their payment
            information for specific purposes. This could encompass arrangements like
            recurring payments for services such as mobile subscriptions, installment-based
            payments for purchases, arrangements for ad-hoc charges like account top-ups,
