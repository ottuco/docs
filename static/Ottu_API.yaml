          pattern: ^[-a-zA-Z0-9_]+$
        name:
          type: string
          description: The name of the payment method.
        type:
          enum:
            - e_commerce
            - payment_request
          type: string
          x-spec-enum-id: ad398830c7970f0a
          description: |-
            The type of the payment transaction.

            * `e_commerce` - Ecommerce
            * `payment_request` - Payment Request
        amount:
          type: string
          description: The total amount to be charged, including fees.
        currency_code:
          type: string
          description:
            The currency code for the payment method represented as an
            ISO 4217 code.
          maxLength: 3
        fee:
          type: string
          description: The fee charged by the payment gateway.
        fee_description:
          type: string
          description:
            This field provides the label for any additional transaction
            fee. In the SDK, this label will be displayed prominently during the checkout
            process to inform the payer about the nature of the fee. Ensure to incorporate
            this field in a clear and visible manner within the checkout UI to maintain
            transparency with the end-users.
        icon:
          type: string
          format: uri
          description: The svg URL of the icon for the payment method.
        icons:
          allOf:
            - $ref: "#/components/schemas/Icons"
          description: The URLs of the icon for the payment method.
        pg_icons:
          allOf:
            - $ref: "#/components/schemas/MIDIcon"
          description: Represents list of mid icons configured for `pgmid` settings
        flow:
          enum:
            - redirect
          type: string
          x-spec-enum-id: ac32c30ac744401d
          description: |-
            The flow type of the payment method.

            1. `redirect`:
            - **Web SDK**: After submitting the payload as per `Submit redirect payment method API`, you will receive a `redirect_url`. Redirect the payer to this URL using: `window.location.href = redirect_url`.
            - **Mobile SDK**: After submitting the payload, open the received `redirect_url` in a webview.

            = redirect_url`.
            - **Mobile SDK**: Open the `redirect_url` directly in a webview. Ensure you append the query string `channel=mobile_sdk` to the end of the URL, taking care with the concatenation if the `redirect_url` already contains other query parameters.

            Common Webview Closing Method (for both `redirect` and `ottu_pg` in Mobile SDK):
            Detect the URL redirection by listening to redirects within the webview. When a redirect occurs to the URL `{merchant_id}/b/gw/mobile-sdk-redirect`, close the webview. This indicates that the payment process has completed. After closing the webview, reload the SDK and call the `Retrieve init data API` to display the payment result from `response object` to the payer. Note: `merchant_id` is the same ID used to build the `Fetch retrieve data API` and is the parameter added in the CheckoutSDK.init method.



            * `redirect` - Redirect
        redirect_url:
          type: string
          format: uri
          description:
            "This field is used for the `ottu_pg` payment flow. When `flow`
            is `ottu_pg`, the payer will be directly redirected to this URL. This
            field is only present when `flow` is `ottu_pg`. For web integrations:
            Use `window.location.href = redirect_url` to redirect the payer to the
            specified URL. For mobile SDK integrations: Open the `redirect_url` in
            the webview. Upon redirecting to the provided URL, the webview should
            be closed and the transaction refreshed using the `Checkout SDK / Retrieve
            init data API`. Detect the URL redirection by listening to redirects in
            the webview. When a redirect occurs to a URL containing the `merchant_id`
            domain, close the webview and reload the SDK after calling the `Retrieve
            init data API`."
        can_save_card:
          type: boolean
          description:
            When true, display a checkbox in the SDK for card saving with
            this payment method. When false, do not display the checkbox.
        submit_url:
          type: string
          format: uri
          description:
            "When submitting information via POST, the appropriate URL
            depends on the `flow` value:`redirect`: The URL is for submitting `payment_methods[index].code`."
        billing:
          allOf:
            - $ref: "#/components/schemas/Billing"
          description:
            Detailed billing information for the payment method, including
            formatted amounts for display and raw values for processing. Contains
            both the total transaction amount and any applicable fees with their respective
            currency codes and labels.
