            * `attempted` - Attempted
            * `authorized` - Authorized
            * `paid` - Paid
            * `failed` - Failed
            * `canceled` - Canceled
            * `expired` - Expired
            * `invalided` - Invalided
            * `refunded` - Refunded
            * `cod` - Cash on Delivery
        status:
