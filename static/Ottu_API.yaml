            $ref: "#/components/schemas/PaymentLabel"
      required:
        - is_available
        - payment_labels
        - single_checkout_enabled
    TokenPayInstrument:
      type: object
      description: Token-based payment instrument for auto-debit
      properties:
        instrument_type:
          enum:
            - token
          type: string
          x-spec-enum-id: 961e6cfa88079418
          default: token
          description: |-
            Payment type: Token (Auto-Debit)

            * `token` - token
        payload:
          allOf:
            - $ref: "#/components/schemas/TokenPayPayload"
          description:
            Token for auto-debit payment. Provide the payment token or
            CVV code as received from your tokenization service.
      required:
        - payload
    TokenPayPayload:
      type: object
      description: Payload for token-based payment (auto-debit)
      properties:
        token:
          type: string
          description: Payment token or CVV code for auto-debit tokenization.
      required:
        - token
    URLShortener:
      type: object
      properties:
        url:
          type: string
          format: uri
          description:
            "The URL that needs to be shortened, Must be a valid HTTP or
            HTTPS URL, For example: 'https://www.example.com', The URL should not
            exceed the maximum length of 2048 characters."
        code:
          type: string
          description:
            "Represents the chosen URL shorter service provide ie:(djshorter,
            yourls),if chosen backend will use it to shorten the URL, else backend
            will use the default global configured instance,Note: the provider value
            will be decided via offline communication ie(ottu core pm contacting real-estate
            service pm)."
      required:
        - url
    URPay:
      type: object
      properties:
        code:
          type: string
          description: The slug code of the payment method.
          pattern: ^[-a-zA-Z0-9_]+$
        name:
          type: string
          description: The name of the payment method.
        type:
          enum:
            - e_commerce
            - payment_request
          type: string
          x-spec-enum-id: ad398830c7970f0a
          description: |-
            The type of the payment transaction.

            * `e_commerce` - Ecommerce
            * `payment_request` - Payment Request
        amount:
          type: string
          description: The total amount to be charged, including fees.
        currency_code:
          type: string
          description:
            The currency code for the payment method represented as an
            ISO 4217 code.
          maxLength: 3
        fee:
          type: string
          description: The fee charged by the payment gateway.
        fee_description:
          type: string
          description:
            This field provides the label for any additional transaction
            fee. In the SDK, this label will be displayed prominently during the checkout
            process to inform the payer about the nature of the fee. Ensure to incorporate
            this field in a clear and visible manner within the checkout UI to maintain
            transparency with the end-users.
        icon:
          type: string
          format: uri
          description: The svg URL of the icon for the payment method.
        icons:
          allOf:
            - $ref: "#/components/schemas/Icons"
          description: The URLs of the icon for the payment method.
        pg_icons:
          allOf:
            - $ref: "#/components/schemas/MIDIcon"
          description: Represents list of mid icons configured for `pgmid` settings
        flow:
          enum:
            - urpay
          type: string
          x-spec-enum-id: 1b60a00558bbffc5
          description: |-
            Use the `submit_url` to retrieve the OTP needed to complete the payment.Then for the OTP submission process you can use the `payment_url`

            * `urpay` - URPay
        redirect_url:
          type: string
          format: uri
          description:
            "This field is used for the `ottu_pg` payment flow. When `flow`
            is `ottu_pg`, the payer will be directly redirected to this URL. This
            field is only present when `flow` is `ottu_pg`. For web integrations:
            Use `window.location.href = redirect_url` to redirect the payer to the
            specified URL. For mobile SDK integrations: Open the `redirect_url` in
            the webview. Upon redirecting to the provided URL, the webview should
            be closed and the transaction refreshed using the `Checkout SDK / Retrieve
            init data API`. Detect the URL redirection by listening to redirects in
            the webview. When a redirect occurs to a URL containing the `merchant_id`
            domain, close the webview and reload the SDK after calling the `Retrieve
            init data API`."
        can_save_card:
          type: boolean
          description:
            When true, display a checkbox in the SDK for card saving with
            this payment method. When false, do not display the checkbox.
        submit_url:
          type: string
          format: uri
          description:
            The URL used in the SMS payment flow, such as for STC Pay.
            It is utilized for submitting request for an OTP and authorizing the transaction,
            This URL facilitates the first steps in the transaction verification and
            payment process.
        billing:
          allOf:
            - $ref: "#/components/schemas/Billing"
          description:
            Detailed billing information for the payment method, including
            formatted amounts for display and raw values for processing. Contains
            both the total transaction amount and any applicable fees with their respective
            currency codes and labels.
        payment_url:
          type: string
          format: uri
          description:
            The URL used in the SMS payment flow, such as for STC Pay.
            It is utilized for submitting an OTP and capturing the transaction following
            the authorization process and the OTP request. This URL facilitates the
            final steps in the transaction verification and payment process.
      required:
        - amount
        - billing
        - can_save_card
        - code
        - currency_code
        - fee
        - fee_description
        - flow
        - icon
        - icons
        - name
        - payment_url
        - type
    URPayGenericError:
      type: object
      properties:
        message:
          type: string
          default: generic error.
    URPayPayPaymentRejectedResponse:
      oneOf:
        - $ref: "#/components/schemas/URPayGenericError"
    URPayPayRejectedResponse:
      oneOf:
        - $ref: "#/components/schemas/SMSPaymentSDKSuccessCallback"
        - $ref: "#/components/schemas/SMSPaymentSDKCancelCallback"
        - $ref: "#/components/schemas/SMSPaymentSDKErrorCallback"
    URPayPaymentAuthorize:
      type: object
      properties:
        message:
          type: string
          default:
            The transaction's One-Time Password (OTP) has been successfully
            sent.
    UnifiedUIInvoice:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        status:
          enum:
            - sent
            - paid
            - overdue
            - canceled
          type: string
          x-spec-enum-id: c131c51a82b6f22a
          description: |-
            Current status of the invoice. Can be one of the following: `sent`, `paid`, `overdue`, `canceled`.

            * `sent` - Sent
            * `paid` - Paid
            * `overdue` - Overdue
            * `canceled` - Canceled
        is_deleted:
          type: boolean
          title: Is Deleted?
          description: Mark true to transfer this invoice to archived list.
        txn:
          type: string
        txn_type:
          type: string
        txn_session_id:
          type: string
        invoice_number:
          type: string
          description:
            A unique identifier for the invoice, typically used for tracking
            and referencing purposes.
          maxLength: 255
        invoice_date:
          type: string
          format: date
          readOnly: true
          description: The date when the invoice was issued to the customer.
        due_date:
          type:
            - string
            - "null"
          format: date
          description:
            The date by which the customer is expected to make payment
            for the invoice.
        tax_rate:
          type: string
          title: Tax
          description: The tax rate applied to the invoice, expressed as a percentage.
          maxLength: 8
        tax_amount:
          type: string
          description: The total amount of tax applied to the invoice.
          maxLength: 20
        discount_percentage:
          type:
            - string
            - "null"
          description:
            The percentage-based discount applied to the full invoice amount,
            including taxes. If set, the discount_amount field will be automatically
            calculated. Both discount_amount and discount_percentage cannot be set
            simultaneously. The discount cannot be higher than the `total_excl_tax`
            field.
          maxLength: 8
        discount_amount:
          type:
            - string
            - "null"
          description:
            The fixed amount discount applied to the full invoice amount,
            including taxes. If set, the discount_percentage field will be set to
            null. Both discount_amount and discount_percentage cannot be set simultaneously.
            The discount cannot be higher than the `total_excl_tax` field.
          maxLength: 20
        shipping_tax_rate:
          type: string
          description:
            "The tax rate applied to the shipping cost, expressed as a
            percentage. "
          maxLength: 20
        shipping_incl_tax:
          type: string
          title: Shipping Incl. Tax
          description:
            The cost of shipping for the invoice, including all applicable
            taxes.
          maxLength: 20
        shipping_excl_tax:
          type: string
          title: Shipping Excl. Tax
          description: The cost of shipping for the invoice, excluding taxes.
          maxLength: 20
        shipping_method:
          type: string
          description:
            The method or service used for shipping the items associated
            with the invoice.
          maxLength: 255
        subtotal:
          type: string
          description: Sum of total_incl_tax's of all invoice items.
          maxLength: 20
        total_excl_tax:
          type: string
          title: Total Excl. Tax
          description: The total amount of the invoice, excluding taxes.
          maxLength: 20
        total_incl_tax:
          type: string
          title: Total Incl. Tax
          description: The total amount of the invoice, including all applicable taxes.
          maxLength: 20
        invoice_items:
          type: array
          items:
            $ref: "#/components/schemas/UnifiedUIInvoiceItem"
        currency_code:
          type: string
        customer_full_name:
          type: string
        company_name:
          type: string
        invoice_pdf_url:
          type: string
          format: uri
          title: Invoice short url
          description:
            A short URL that links to the invoice pdf file. This URL may
            be included in email/sms notifications sent to the customer regarding
            their payment or displayed on the checkout page to allow the customer
            to easily access their invoice.
          maxLength: 5000
      required:
        - company_name
        - currency_code
        - customer_full_name
        - id
        - invoice_date
        - invoice_items
        - invoice_number
        - shipping_excl_tax
        - shipping_incl_tax
        - shipping_tax_rate
        - subtotal
        - total_excl_tax
        - total_incl_tax
        - txn
        - txn_session_id
        - txn_type
    UnifiedUIInvoiceItem:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        sku:
          type: string
          description: Unique identifier for the invoice item.
          maxLength: 255
        description:
          type: string
          description: Product name or a brief description of the item.
          maxLength: 255
        quantity:
          type: string
          description: Number of units of the product.
          maxLength: 20
        unit_price:
          type: string
          description: Price per unit of the product, excluding tax.
          maxLength: 20
        tax_rate:
          type: string
          title: Tax
          description: Tax rate applied to the invoice item.
          maxLength: 8
        tax_amount:
          type: string
          description: Total tax amount for the invoice item.
          maxLength: 20
        discount_percentage:
          type: string
          description:
            Percentage-based discount applied to the invoice item. The
            calculated discount cannot exceed theitem's total value, including tax.
          maxLength: 8
        discount_amount:
          type: string
          description:
            Fixed amount discount applied to the invoice item. The discount
            cannot exceed the item's total value, including tax.
          maxLength: 20
        total_excl_tax:
          type: string
          title: Total Excl. Tax
          description:
            Total value of the invoice item, excluding tax. This is calculated
            as (unit_price * quantity) - discount.
          maxLength: 20
        total_incl_tax:
          type: string
          title: Total Incl. Tax
          description:
            Total value of the invoice item, including tax. This is calculated
            as (unit_price * quantity) - discount + applicable tax.
          maxLength: 20
      required:
        - description
        - id
        - quantity
        - sku
        - total_excl_tax
        - total_incl_tax
        - unit_price
    Unit:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
        slug:
          type: string
      required:
        - id
        - slug
        - title
    UserCards:
      type: object
      properties:
        type:
          enum:
            - sandbox
            - production
          type: string
          x-spec-enum-id: df081db980375d31
          description: |-
            Choose between `sandbox`, `production`. To retrieve the cards associated to specified environment type.Payment Gateway MIDs, or production to fetch real cards used in live transactions.

            * `sandbox` - Sandbox
            * `production` - Production
        customer_id:
          type: string
          description:
            Retrieve cards associated with a specific customer using their
            unique customer_id.
        pg_codes:
          type: array
          items: {}
          description:
            Specify the `pg_code` if you want to retrieve cards for a particular
            payment gateway, such as `credit-card`. The pg_code is initialized in
            the `Checkout API` when the `session_id` is created, with each card being
            associated with a single payment gateway/pg_code.
        agreement_id:
          type: string
          description:
            Retrieve the card associated with a specific agreement ID.
            When this parameter is provided, the resulting array will contain a maximum
            of one entry, representing the latest card the customer has used for the
            auto-debit payment associated with the given agreement ID.
      required:
        - customer_id
        - type
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    tokenAuth:
      type: apiKey
      in: header
      name: Authorization
      description: Token-based authentication with required prefix "Token"
servers:
  - url: https://sandbox.ottu.net
