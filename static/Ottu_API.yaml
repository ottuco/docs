            that are automatically deducted, such as recurring subscriptions, installments,
            or unscheduled auto-debits. \n\nChoose `save_card` if you want to perform
            a card tokenization operation.\n\nNOTE: If `auto_debit` is selected: \n1.
            `agreement` and `customer_id` parameters will also be mandatory. \n2.
            Only PG codes supporting tokenization can be selected. \nAs a side effect,
            the card used for the payment will be associated with the supplied `agreement.id`.
            This card will be locked, preventing the customer from deleting it from
            the system until an alternate card is chosen for auto-debit payments.\n\nNOTE:
            If `save_card` is selected: \n1. The amount must be zero for the save
            card operation. \n2. The selected MID(pg_code) must support tokenization
            to enable the save card operation. \n3. Please note that the save card
            operation is considered successful without any funds being charged.\n4.
            Once a card is created, Ottu will send a webhook containing the card details
            to the merchant's webhook URL.\n5. When the transaction type is `save_card`,
            all previously saved cards returned in the sdk_preload_payload should
            be hidden since the user is saving a new card and does not need to select
            from existing ones.\n\n* `one_off` - One Off\n* `auto_debit` - Auto Debit\n*
            `save_card` - Save Card"
        payment_methods:
          type: array
          items:
            $ref: "#/components/schemas/PaymentMethods"
          description:
            "The provided documentation describes the `payment_methods`
            field.\n\n Detailing the types of payment methods included and their functionality
            \nas well as backward compatibility considerations for removed methods.
            \n\nThe `payment_methods` field includes various payment options available
            to customers\nexcluding device-specific methods like `apple_pay`, `google_pay`and
            `flex_methods` represented in flex methods section\nit primarily supports
            methods requiring a redirect flow\nwhere users complete transactions on
            an external webpage.\n\n`Functionality`: users are redirected to an external
            \nsite mostly to gateway payment page \nusing `redirect_url` where they
            can complete the payment flow\n\n**The dynamic nature of the payment_methods**:`payment_methods`
            type is an array of objects \nand it's type allows it to accommodate an
            unlimited variety of payment options\nas each object represents a gateway
            payment option but strictly associated to redirect payment flow\n\n**Backward
            Compatibility Notice:**\n\n`stc_pay`: \nprevious Inclusion, `stc_pay`
            was formerly listed within the `payment_methods` array\nit has been removed
            in favor of a more streamlined integration within the SDK\nsimilar to
            the approach for `payment_services`.\n\n**Backward Compatibility:** \n\nThe
            SDK must still support STC Pay for applications relying on older API versions.\nAlthough
            it will not appear in current and future versions\nthe SDK will manage
            its inclusion internally\n\nto ensure a seamless transition and consistent
            user experience\nacross different API versions, without disrupting existing
            integrations.\n"
        payment_services:
          type: array
          items:
            $ref: "#/components/schemas/PaymentServices"
          description:
            "Dedicated to singular, prominently featured payment options\n\nsuch
            as `apple_pay`, `google_pay`, `samsung_pay`, `stc_pay`, etc.,\nthe `payment_services`
            field presents these methods in a distinctive manner.\n\nUnlike `payment_methods`,
            payment services are intended to be displayed uniquely,\nTypically represented
            by dedicated buttons or interfaces within the payment page.\n\nThis ensures
            that each payment service,\nidentifiable by its unique flow ie: (`apple_pay`,
            `stc_pay`)\nis presented no more than once to the user\nmaintaining clarity
            and simplicity in the payment selection process.\n\n**Backward Compatibility
            Notice**:\nhistorically, the availability of (`apple_pay`, `google_pay`)
            \nwas indicated through the `apple_pay_available` and `google_pay_available`
            flags\nat the root level of the API response.\n\nWith the evolution of
            the API, these flags have been deprecated, \nand the respective payment
            methods have been integrated into the `payment_services` array.\n\nDespite
            this restructuring, backward compatibility for these payment methods\nis
            preserved in the SDK to accommodate previous API versions,\nensuring a
            seamless transition for existing implementations.\n"
        flex_methods:
          type: array
          items:
            $ref: "#/components/schemas/FlexMethods"
          description: |
            The `flex_methods` field encompasses a comprehensive array
            of payment options available to customers,
            explicitly excluding device-specific methods such as `apple_pay`
            `google_pay`, redirect flow `payment_methods` and tokenized card solutions
            otherwise it represents the flexible payment methods ie:(`tamara`, `tabby`, `taly`)
            payment options that necessitate dynamic flows
            where SDK might need to fetch some `pre-payment-check` API calls then
            users are guided to an external webpage to finalize their payment transactions.

            It's important to note that the flex_methods array is dynamic
            and can accommodate an unlimited array of payment methods.
            each method listed should be individually rendered within the user interface with a separated flow.
        sdk_studio:
          type: object
          additionalProperties: {}
          description:
            Represents the configuration of SDK Studio configuration, which
            includes the available payment methods and services sdk config required
            by the frontend to initialize the payment SDK properly.
          readOnly: true
        response:
          type: array
          items:
            $ref: "#/components/schemas/Response"
          description:
            "**What is a payment gateway response?**\n\nA payment gateway
            response is the feedback received\nfrom payment gateway after a user has
            completed a payment\nthis response provides information on whether the
            payment was successful or if it was canceled or failed.\n\n**When do we
            receive the response?**\n\nWe receive the payment gateway response immediately
            after the user has made a payment\nor after n of minutes defined for a
            gateway inquiry request initiated by ottu core\nto fetch the transaction
            status after the defined time for each gateway.\n\n**Which attempt do
            we get the response for?**\n\nthe response we provide is from the most
            recent payment attempt.\nthis ensures that the information reflects the
            latest status of the transaction.\n\n**Structure of the response**: \n\nThe
            response structure is managed by our SDK,\nwhich updates the payment details
            and triggers one of three callbacks\nbased on the status provided in the
            response:\n\n`successCallback`: Triggered if the response.status indicates
            a successful payment.\n\n`cancelCallback`: Triggered if the response.status
            indicates a canceled payment.\n\n`errorCallback`: Triggered if the response.status
            indicates a error payment.\n\n"
        state:
          enum:
            - created
            - pending
            - attempted
            - authorized
            - paid
            - failed
            - canceled
            - expired
            - invalided
            - refunded
            - cod
          type: string
          x-spec-enum-id: caee163196dbc11f
          readOnly: true
          description: |-
            The current state of the payment transaction, it helps to understand the progress of the payment.

            * `created` - Created
            * `pending` - Pending
            * `attempted` - Attempted
            * `authorized` - Authorized
            * `paid` - Paid
            * `failed` - Failed
            * `canceled` - Canceled
            * `expired` - Expired
            * `invalided` - Invalided
            * `refunded` - Refunded
            * `cod` - Cash on Delivery
        type:
          enum:
            - e_commerce
            - payment_request
          type: string
          x-spec-enum-id: ad398830c7970f0a
          description: |-
            The type of the payment transaction. This field represents the purpose of the payment and can be one of several pre-defined choices.

            * `e_commerce` - Ecommerce
            * `payment_request` - Payment Request
        is_amount_editable:
          type: boolean
          readOnly: true
          title: Editable amount
          description:
            This field specifies whether the customer can modify the payment
            amount and choose the amount he wishes to pay.
        session_id:
          type: string
          readOnly: true
          description:
            A unique identifier for each payment transaction, used to maintain
            the session state during the payment process.
        cancel_url:
          type: string
          format: uri
          readOnly: true
          description:
            "This endpoint used to cancel the transaction using the merchant
            cancellation flow, \nto ensure the transaction cannot be paid again \nand
            trigger the webhook notification \n"
      required:
        - amount
        - billing
        - cancel_url
        - cards
        - currency_code
        - flex_methods
        - is_amount_editable
        - language
        - operation
        - payment_methods
        - payment_services
        - response
        - sdk_studio
        - session_id
        - state
        - type
    CheckoutSubmit:
      type: object
      description: |-
        This serializer is responsible for validating the data sent by the SDK
        when the user submits the payment form and for creating the url.
      properties:
        amount:
          type: string
          format: decimal
        customer_additional_phone:
          type: string
          description:
            The customer's additional phone number, if any. This field
            can be updated by the customer on the payment page or in the Checkout
            SDK.
          maxLength: 32
        pg_code:
          enum:
            - dummy
          type: string
          x-spec-enum-id: 5130c80a788d4b63
          description: |-
            the unique identifier code (`payment_methods[index].code`) for the payment method that the customer has selected to proceed with the transaction.

            * `dummy` - Dummy
        save_card:
          type: boolean
          default: false
          description:
            If true, the card will be saved for future payments. This option
            is only available if the payment gateway supports it.
        status:
          enum:
            - success
            - error
            - failed
          type: string
          x-spec-enum-id: e1fe233c555c1d4d
          readOnly: true
          description: |-
            The status of the payment operation.It can be one of the following values: `success`, `canceled`, `error`

            * `success` - Success
            * `error` - Error
            * `failed` - Failed
        message:
          type: string
          readOnly: true
          description: The message to be displayed to the user.
        redirect_url:
          type: string
          format: uri
          readOnly: true
          description:
            This field provides the URL to which the customer should be
            redirected in order to complete the payment process when they have selected
            this specific payment method. The developer implementing the SDK must
            ensure that the redirection process is smooth and secure, providing a
            seamless experience for the customer while maintaining the integrity of
            the payment process.
        channel:
          enum:
            - web_sdk
            - mobile_sdk
            - hosted
            - api
          type: string
          x-spec-enum-id: 1fe0752a05a7277d
          default: web_sdk
          description: |-
            IMPORTANT: This field determines the channel through which the payment is being made and has a direct impact on the redirection behavior post-payment.

            For Web (`web_sdk`):
            - The payer will be redirected to the payment details page where they can complete the payment process. Use the code: `window.location.href = redirect_url` and the browser will handle any further redirects.

            For Mobile SDK (`mobile_sdk`):
            - The `redirect_url` should be opened in a webview. This is the page where the payer will enter their card details.
            - After entering the card details, the payer will be redirected to the final payment details page within the webview.
            - Detect the URL redirection by listening to redirects within the webview. When a redirect occurs to the URL `{merchant_id}/b/gw/mobile-sdk-redirect`, close the webview. This indicates that the payment process has completed.
            - After closing the webview, reload the SDK and call the `Retrieve init data API` to display the payment from `response object` to the payer.

            Note:  `merchant_id` is the same ID used to build the `Fetch retrieve data API` and is the parameter added in the CheckoutSDK.init method.

            * `web_sdk` - Web Sdk
            * `mobile_sdk` - Mobile Sdk
            * `hosted` - Hosted
            * `api` - Api
      required:
        - message
        - pg_code
        - redirect_url
        - status
    CheckoutSubmitSuccessResponse:
      type: object
      properties:
        status:
          type: string
          readOnly: true
          default: success
          description:
            "The status of the payment operation.It can be one of the following
            values: `success`, `canceled`, `error`"
        message:
          type: string
          readOnly: true
          description: The message to be displayed to the user.
        redirect_url:
          type: string
          format: uri
          description:
            This field provides the URL to which the customer should be
            redirected in order to complete the payment process when they have selected
            this specific payment method. The developer implementing the SDK must
            ensure that the redirection process is smooth and secure, providing a
            seamless experience for the customer while maintaining the integrity of
            the payment process.
      required:
        - message
        - redirect_url
        - status
