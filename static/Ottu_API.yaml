    Operation:
      type: object
      description: |-
        Fetch the payment txn based on the order no or session id
        also, if the payment txn is not in the accepted state for the
        input operation, raise an error
      properties:
        order_no:
          type: string
          description:
            This is an optional identifier used to specify the payment
            transaction upon which the operation should be performed. You can use
            either the `order_no` or `session_id` field; at least one of these two
            identifiers must be provided to select the payment transaction that should
            be actioned.
          maxLength: 128
        session_id:
          type: string
          description:
            Similar to `order_no`, `session_id` is an optional identifier
            used to specify the payment transaction for the operation. You must provide
            either `order_no` or `session_id` in order to select the appropriate payment
            transaction.
          maxLength: 128
        operation:
          enum:
            - delete
            - cancel
            - expire
            - refund
            - capture
            - void
          type: string
          description: |-
            * `delete` - delete
            * `cancel` - cancel
            * `expire` - expire
            * `refund` - refund
            * `capture` - capture
            * `void` - void
          x-spec-enum-id: 943f8b45fb88fe59
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,13}(?:\.\d{0,3})?$
          description:
            This field is optional and used to specify the amount you want
            to action for `refund` and `capture` operations. If not specified, Ottu
            will attempt to perform the operation on the full amount, or the remaining
            amount if previous operations have been performed. Keep in mind that `void`
            operations always concern the full amount; the `amount` field is not considered
            in this case. The `amount` field can be sent for all operations, but it
            will only be taken into account for `refund` and `capture` operations.
        extra:
          type: object
          additionalProperties: {}
          description:
            "This field is optional and used to specify additional parameters
            for the operation. \n\n**IFG**: \n\n<b>Full Refund Details</b>\n\nFor
            full refund you don't need to use extra key.\n\n<b>Partial Refund Details</b>\n\nFor
            operations involving partial refunds, the extra field allows specifying
            individual ticket orders along with their corresponding refund amounts.\n\nThis
            capability ensures precise control over the refund amounts for each ticket
            within an order.\n\n<b>Key Points</b>\n\n`passengerDocumentNumber`: It
            is imperative to include the document number for each ticket involved
            in the refund operation. This ensures that the refund is accurately applied
            to the correct tickets within an order.\n\n`amount`: Alongside each ticket
            document number, specify the desired refund amount for that ticket and
            make sure the type of amount is `INT`.\n\n`Excluding Tickets`:  If certain
            tickets within an order should not be refunded, you can specify a refund
            amount of zero for those tickets. This approach allows for selective refunding
            within a single order.\n\n`Important Note`\n\nAll tickets intended for
            refund must be explicitly listed in the refund order details, with their
            respective refund amounts clearly defined. This requirement ensures comprehensive
            and error-free processing of partial refunds.\n\n<b>Example</b>\n\ncheck
            in Request samples there is an example showcasing how to structure the
            extra field for a partial refund request, including specifying refund
            amounts for tickets"
      required:
        - operation
