  /b/pbl/v2/message-notification/:
    post:
      operationId: message_notifications
      description:
        "The Message Notifications API provides an interface to send proper
        notification for any given transaction based on the provided `session_id`
        or `order_no`.\n\nThis API is useful when you need to manually trigger the
        notification process for a specific payment transaction, such as when a payment
        is successful but the notification has not been sent.\n\nTwo key identifiers,
        `order_no` and `session_id`, can be used interchangeably to specify the payment
        transaction that the operation should be applied to.\n\nBy providing any combination
        of `email`, `sms` or `whatsapp` in `channels`, if relative configurations
        are present and the transaction's notification field has the event inside
        the specified channel, the API will initiate the notification process. \n\nFor
        every operation, the API provides a clear response containing information
        about the executed operation, a user-friendly message (`detail`), and the
        operation's result (`success` indicates a successful operation).\n\n"
      summary: Message Notifications
      parameters:
        - in: header
          name: Authorization
          schema:
            type: string
            default: Api-Key vSUmxsXx.V81oYvOWFMcIywaOu57Utx6VSCmG11lo
          description: Private API key to be provided in the format `Api-Key <key>`.
          required: true
      tags:
