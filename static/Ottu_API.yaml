components:
  schemas:
    ABAPayWay:
      type: object
      description: Serializer for handling base implementation of ABA PayWay.
      properties:
        session_id:
          type: string
          description:
            A unique identifier for each payment transaction, used to maintain
            the session state during the payment process.
        pg_code:
          type: string
          description:
            PG code of payment gateway which a customer selected to perform
            the payment or authorization.
        sub_option:
          type: string
          description:
            Represent the sub-option of the payment method selected by
            the user from the available options provided by the PG.
      required:
        - pg_code
        - session_id
        - sub_option
    ABAPayWayFailureResponse:
      oneOf:
        - $ref: "#/components/schemas/ABAPayWaySubmitSDKErrorCallback"
    ABAPayWayFormData:
      type: object
      properties:
        req_time:
          type: string
          description: Request timestamp in the format YYYYMMDDHHMMSS.
        merchant_id:
          type: string
          description: Unique identifier for the merchant.
        tran_id:
          type: string
          description: Unique transaction identifier.
        amount:
          type: string
          description: Transaction amount as a string, e.g., '10.73'.
        firstname:
          type: string
          description: Customer's first name.
        lastname:
          type: string
          description: Customer's last name.
        email:
          type: string
          format: email
          description: Customer's email address.
        phone:
          type: string
          description: Customer's phone number in international format.
        type:
          type: string
          description: "Type of transaction: `purchase` or `pre-auth`."
        payment_option:
          type: string
          description: Selected ABA PayWay payment option.
        return_url:
          type: string
          format: uri
          description: Webhook URL to post **only** the success response.
        currency:
          type: string
          description: Currency code, e.g., 'USD' or 'KHR'.
        lifetime:
          type: integer
          description: Lifetime of the payment session in minutes.
        view_type:
          type: string
          description: "View type for the payment interface: `popup`."
        payment_gate:
          type: integer
          description:
            Payment gate identifier, usually 0 for ABA PayWay to use their
            checkout.
        hash:
          type: string
          description: Security hash for ABA PayWay to validate the payload.
      required:
        - amount
        - currency
        - email
        - firstname
        - hash
        - lastname
        - lifetime
        - merchant_id
        - payment_gate
        - payment_option
        - phone
        - req_time
        - return_url
        - tran_id
        - type
        - view_type
    ABAPayWaySDK:
      type: object
      description: Base serializer for different Flex payment methods.
      properties:
        code:
          type: string
          description: The slug code of the payment method.
          pattern: ^[-a-zA-Z0-9_]+$
        name:
          type: string
          description: The name of the payment method.
        type:
          enum:
            - e_commerce
            - payment_request
          type: string
          x-spec-enum-id: ad398830c7970f0a
          description: |-
            The type of the payment transaction.

            * `e_commerce` - Ecommerce
            * `payment_request` - Payment Request
        amount:
          type: string
          description: The total amount to be charged, including fees.
        currency_code:
          type: string
          description:
            The currency code for the payment method represented as an
            ISO 4217 code.
          maxLength: 3
        fee:
          type: string
          description: The fee charged by the payment gateway.
        fee_description:
          type: string
          description:
            This field provides the label for any additional transaction
            fee. In the SDK, this label will be displayed prominently during the checkout
            process to inform the payer about the nature of the fee. Ensure to incorporate
            this field in a clear and visible manner within the checkout UI to maintain
            transparency with the end-users.
        flow:
          enum:
            - aba_payway
          type: string
          description: "* `aba_payway` - ABA PayWay"
          x-spec-enum-id: 589d7f78e5da99b5
          default: aba_payway
        submit_url:
          type: string
          format: uri
          description:
            The URL to which the SDK should submit a POST request, based
            on the selected `flow` type. For `aba_payway`, this URL is used to submit
            the selected value from `flex_options.payment_sub_options[index].value`
            and receive a payload for HTML form generation.
        billing:
          allOf:
            - $ref: "#/components/schemas/Billing"
          description:
            Detailed billing information for the payment method, including
            formatted amounts for display and raw values for processing. Contains
            both the total transaction amount and any applicable fees with their respective
            currency codes and labels.
        payment_sub_options:
          type: array
          items:
            $ref: "#/components/schemas/PaymentSubOptionSDK"
          description: List of payment options for ABA PayWay.
      required:
        - amount
        - billing
        - code
        - currency_code
        - fee
        - fee_description
        - name
        - type
    ABAPayWaySubmitSDKErrorCallback:
      type: object
      properties:
        message:
          type: string
          readOnly: true
          description:
            A concise description detailing the outcome of the operation.
            Suitable for presenting to the end-user if needed.
        form_of_payment:
          enum:
            - aba_payway
          type: string
          x-spec-enum-id: 589d7f78e5da99b5
          readOnly: true
          default: aba_payway
          description: |-
            Indicates the form of payment used to process the transaction. This can be one of several options, including `apple_pay`, `google_pay`, `samsung_pay`, `token_pay`, `stc_pay`, `urpay`, or `redirect`.It's important to note that the `redirect` option is only present in the `errorCallback`. In other scenarios, especially with `cancelCallback` and `successCallback`, it's absent. This is because, in the redirect flow, the customer is redirected to a different page where actions like payment cancellation or confirmation occur, not on the page where the SDK is displayed.

            * `aba_payway` - ABA PayWay
        challenge_occurred:
          type: boolean
          default: false
          description:
            This flag indicates if an additional verification, such as
            3DS, OTP, PIN, etc., was initiated during the payment process. Use this
            flag in cancelCallback and errorCallback to control the presentation of
            error messages, especially for on-site payments undergoing a challenge
            flow. For example, after a failed 3DS verification, it's useful to show
            a custom popup informing the user of the payment failure. However, it's
            crucial to note that not all on-site failed payments need custom error
            messaging. In cases like GooglePay or ApplePay, error messages are inherently
            handled by the Payment Sheet, which remains open for the user to retry,
            making this distinction vital.
        session_id:
          type: string
        order_no:
          type: string
          description:
            The unique identifier assigned to this payment transaction.
            It is used for tracking purposes and is set by the merchant or the system.
        reference_number:
          type: string
          description: The reference number.
        status:
          type: string
          readOnly: true
          default: error
          description: The payment is errored. `errorCallback` must be triggered.
      required:
        - form_of_payment
        - message
        - session_id
        - status
    ABAPayWaySubmitSDKSuccessCallback:
      type: object
      description:
        Callback payload to be forwarder directly to `successCallback`
        SDK method.
      properties:
        message:
          type: string
          readOnly: true
          description:
            A concise description detailing the outcome of the operation.
            Suitable for presenting to the end-user if needed.
        form_of_payment:
          enum:
            - aba_payway
          type: string
          description: "* `aba_payway` - ABA PayWay"
          x-spec-enum-id: 589d7f78e5da99b5
          readOnly: true
          default: aba_payway
        challenge_occurred:
          type: boolean
          default: false
          description:
            This flag indicates if an additional verification, such as
            3DS, OTP, PIN, etc., was initiated during the payment process. Use this
            flag in cancelCallback and errorCallback to control the presentation of
            error messages, especially for on-site payments undergoing a challenge
            flow. For example, after a failed 3DS verification, it's useful to show
            a custom popup informing the user of the payment failure. However, it's
            crucial to note that not all on-site failed payments need custom error
            messaging. In cases like GooglePay or ApplePay, error messages are inherently
            handled by the Payment Sheet, which remains open for the user to retry,
            making this distinction vital.
        session_id:
          type: string
          description:
            A unique identifier for each payment transaction, used to maintain
            the session state during the payment process.
        status:
          type: string
          readOnly: true
          default: success
          description: The payment is successful. `successCallback` must be triggered.
        order_no:
          type: string
          description:
            The unique identifier assigned to this payment transaction.
            It is used for tracking purposes and is set by the merchant or the system.
        reference_number:
          type: string
          description:
            This is a unique value associated with each payment attempt
            made by a customer. It serves as the unique identifier for the payment
            when sent to the Payment Gateway (PG). It can be used to identify a specific
            payment attempt within one session, allowing for multiple reference numbers
            per session_id.
        form_url:
          type: string
          format: uri
          description: The URL to which the SDK should POST to.
        js_sdk_src:
          type: string
          format: uri
          description:
            The URL of the JavaScript SDK to be loaded for the payment
            process.
        form_data:
          allOf:
            - $ref: "#/components/schemas/ABAPayWayFormData"
          description: The form data to be submitted for the payment process.
        ws_url:
          type: string
          format: uri
          description: WebSocket URL for real-time updates during the payment process.
      required:
        - form_data
        - form_of_payment
        - form_url
        - js_sdk_src
        - message
        - order_no
        - reference_number
        - session_id
        - status
        - ws_url
