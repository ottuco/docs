          type: string
          readOnly: true
          description:
            A unique identifier for each payment transaction, used to maintain
            the session state during the payment process.
        settled_pg_code:
          type: string
          readOnly: true
          title: Final Payment Gateway
          description:
            The code of the payment gateway used for completing the transaction.
            This field indicates the specific gateway that processed and settled the
