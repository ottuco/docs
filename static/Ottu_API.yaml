        non_default_customer_email:
          type: string
          format: email
          readOnly: true
          title: Customer email
          description: The email address of the customer.
        non_master_unit_config:
          type: string
          readOnly: true
          title: Unit
        extra:
          $ref: "#/components/schemas/ExtraInner"
        order_no:
          type:
            - string
            - "null"
          description:
            The unique identifier assigned to this payment transaction.
            It is used for tracking purposes and is set by the merchant or the system.
          maxLength: 128
        customer_first_name:
          type: string
          description:
            The first name of the recipient of the payment. This field
            is used for various communications such as the invoice, receipt, email,
            SMS, or displayed on the payment page. It may also be sent to the payment
            gateway if necessary.
          maxLength: 64
        customer_last_name:
          type: string
          description:
            The last name of the recipient of the payment. This field is
            used for various communications such as the invoice, receipt, email, SMS,
            or displayed on the payment page. It may also be sent to the payment gateway
            if necessary.
          maxLength: 64
        customer_phone:
          type: string
          description:
            Customer phone number associated with the payment. This might
            be sent to the payment gateway and depending on the gateway, it may trigger
            a click to pay process on the payment page. The phone number will also
            be included in the invoice, receipt, email, and displayed on the payment
            page.
          maxLength: 32
        customer_billing_address:
          allOf:
            - $ref: "#/components/schemas/CustomerBillingAddress"
          readOnly: true
          description:
            Represents the billing address of the customer, which will
            be used for the payment transaction. This information might be used by
            the payment gateway to verify the identity of the customer. It can be
            displayed on the payment page, invoice, receipt, email, etc.
        email_recipients:
          type: string
          description:
            A comma-separated list of email addresses for internal recipients
            who will receive customer emails. These recipients will be included in
            email notifications sent to the customer regarding their payment.
        vendor_name:
          type: string
          description:
            The name of the vendor or merchant associated with this payment.
            This field may be used for accounting and reporting purposes.
          maxLength: 64
        due_date:
          type:
            - string
            - "null"
          format: date
        product_type:
          type: string
          description:
            The type of product or service being purchased. This field
            may be used for tracking and reporting purposes.
          maxLength: 128
        attachment:
          type:
            - string
            - "null"
          format: uri
          description:
            An optional attachment that will be included in email notifications
            sent to the customer regarding their payment, and also be available for
            download on the checkout page. This field may be used to provide the customer
            with additional information or documentation related to their purchase.
        attachment_short_url:
          type: string
          format: uri
          description:
            A short URL that links to the attachment associated with this
            payment. This URL may be included in email/sms notifications sent to the
            customer regarding their payment or displayed on the checkout page to
            allow the customer to easily access the attachment.
          maxLength: 2000
        qr_code_url:
          type: string
          format: uri
          readOnly: true
          description:
            A QR code that, when scanned, redirects to the checkout page
            for this payment. This QR code may be displayed on invoices, receipts,
            or other documents to allow customers to easily access the checkout page
            and make a payment. This parameter is only present when `generate_qr_code`
            is set to true.
        session_id:
          type: string
          readOnly: true
          description:
            A unique identifier for each payment transaction, used to maintain
            the session state during the payment process.
          maxLength: 128
        created:
          type: string
          format: date-time
          readOnly: true
        modified:
          type: string
          format: date-time
          readOnly: true
        state_changed_at:
          type: string
          format: date-time
          readOnly: true
          description:
            A timestamp indicating when the state of this payment transaction
            was last updated. This field may be used to track changes in the state
            of the payment transaction over time.
        invalidation_reason:
          type: string
          readOnly: true
          description:
            If the payment transaction was invalidated, this field contains
            the reason for it.
        initiator:
          allOf:
            - $ref: "#/components/schemas/Initiator"
          readOnly: true
        shortify_checkout_url:
          type: boolean
          default: false
          description:
            If enabled, the checkout URL will be shortened using the configured
            URL shortener.
        short_url:
          type: string
          format: uri
          readOnly: true
          description:
            A short URL link that, when opened, redirects to the checkout
            page for this payment. This URL may be shared with the customer to allow
            them to easily access and complete the payment.
          maxLength: 200
        unit_config:
          allOf:
            - $ref: "#/components/schemas/Unit"
          title: Unit
        notifications:
          title: Notification settings
          description:
            A JSON field that contains the notification settings for this
            payment transaction, including SMS and email notifications, as well as
            the events for which they will be sent (e.g., 'created', 'paid', 'refund',
            'canceled', etc.). This field may be used to configure and customize the
            notifications sent to customers and internal recipients throughout the
            payment process.
        gateway_code:
          type: string
          readOnly: true
          description:
            Represents the payment gateway code that was used to perform
            the payment or authorization.
          maxLength: 16
        pg_codes:
          title: Payment Gateway Codes
          description:
            The list of payment gateway codes from which a customer can
            select to perform the payment or authorization.
        payment_service:
          type: string
          readOnly: true
          description:
            The payment service the customer has used to make the payment,
            such as Apple Pay, Samsung Pay, Google Pay, or another payment service.
            This field may be used to track the payment method used by the customer
            and to help with accounting and reporting.
          maxLength: 32
        service_code:
          type: string
          readOnly: true
          title: Payment service code
          description:
            The service code is used to identify the payment service that
            was used to perform the payment or authorization.
          maxLength: 16
        operation:
          enum:
            - purchase
            - authorize
          type: string
          x-spec-enum-id: fef9cc64394d1c3e
          readOnly: true
          description: |-
            Specifies the type of operation to be performed by the payment gateway. If set to `purchase`, the payment source will be directly charged. If set to `authorize`, the payment source will only be authorized and the actual charge will be made at a later time.

            * `purchase` - Purchase
            * `authorize` - Authorize
        is_sandbox:
          type: boolean
          readOnly: true
          title: Is Sandbox?
          description:
            Indicates whether the operation was performed in a test environment
            or not.
        is_amount_editable:
          type: boolean
          readOnly: true
          title: Editable amount
          description:
            This field specifies whether the customer can modify the payment
            amount and choose the amount he wishes to pay.
        settled_amount:
          type: number
          format: double
          description:
            The paid or authorized amount in the original currency, excluding
            any fees or charges.
          readOnly: true
        paid_amount:
          oneOf:
            - type: number
              format: double
            - type: string
          description:
            Total paid amount in the original currency, with fee. This
            calculation might be the result of currency exchange if it was paid in
            different currency.
          readOnly: true
        fee:
          type: string
          description:
            Fee represents the amount paid by the customer in the currency
            they used for the payment. This currency may differ from the currency
            of the transaction.
          readOnly: true
        refunded_amount:
          type: number
          format: double
          description:
            The total amount which has been refunded back to the customer
            in the original currency, including any fees or charges that were applied
            to the transaction.
          readOnly: true
        voided_amount:
          type: number
          format: double
          description:
            The total amount which has been voided back to the customer
            in the original currency, including any fees or charges that were applied
            to the transaction.
          readOnly: true
        delivery_fee:
          type: string
          readOnly: true
          description:
            This field represents the delivery fee for the order. It is
            applicable only for catalogue transactions.
          maxLength: 120
        webhook_url:
          type: string
          format: uri
          description:
            "URL where the payment result will be sent via a POST request
            after the customer has completed the payment session. The payment result
            will be included in the request body. "
        redirect_url:
          type: string
          format: uri
          description:
            The URL where the customer will be redirected after the payment
            stage only if the webhook URL returns a success status. `order_no`, `reference_number`
            and `session_id` will be appended to the redirect URL as query parameters.
          maxLength: 2000
        capture_delivery_location:
          type: boolean
          title: Capture delivery coordinates
          description:
            "By enabling this, you will ask for user's delivery location
            on a map. "
        capture_delivery_address:
          type: boolean
          description:
            By enabling this, you will ask for user's address. If enabled,
            capture delivery coordinates should also be active.
        agreement:
          description:
            "An established contractual arrangement with the payer, which
            authorizes you to securely store and subsequently utilize their payment
            information for specific purposes. This could encompass arrangements like
            recurring payments for services such as mobile subscriptions, installment-based
            payments for purchases, arrangements for ad-hoc charges like account top-ups,
            or for standard industry practices like penalty charges for missed appointments.
            \n\nNote: If your intention is solely to store payment details for transactions
            initiated by the payer in the future, then this parameter group should
            not be used."
        customer_email:
          type: string
          description:
            The email address of the customer that is used to send payment
            notifications and receipts, and can be used for fraud prevention. This
            field is mandatory and is always sent to the payment gateway. It may also
            be included in the invoice, receipt, email, and displayed on the payment
            page.
          maxLength: 128
        customer_additional_phone:
          type: string
          description:
            The customer's additional phone number, if any. This field
            can be updated by the customer on the payment page or in the Checkout
            SDK.
          maxLength: 32
        customer_shipping_address:
          title: Shipping address
          description:
            The shipping address of the customer where the product or service
            will be delivered to. This information might be used for fraud prevention
            and it can be displayed on the invoice, receipt, email and other communication
            sent to the customer.
        card_acceptance_criteria:
          description: |-
            This field allows you to define specific rules and conditions that a card must meet to be eligible for payment. These stipulations apply regardless of whether a customer chooses to pay using a saved card or opts to add a new card for the transaction. By leveraging the `card_acceptance_criteria`, you gain the power to fine-tune your payment processing strategy, tailoring acceptance rules to align with your business needs, security standards, and risk management policies.

            **Example**: If you run an exclusive service that caters predominantly to premium customers, you might set criteria that only allow transactions from high-tier credit cards like VISA Platinum. This ensures that payments align with the exclusivity and branding of your services. Remember to configure these criteria thoughtfully. Striking the right balance between security, risk mitigation, and user experience is paramount.

            **Note**: The `card_acceptance_criteria` field is applicable only for direct payments and not for hosted session payments.
        seen_at:
          type:
            - string
            - "null"
          format: date-time
          readOnly: true
          description:
            A timestamp indicating when the payment link associated with
            this payment was seen or opened by the customer or any other guest user.
            This field may be used to track when payment links have been accessed.
        email_seen_at:
          type:
            - string
            - "null"
          format: date-time
          readOnly: true
          description:
            A timestamp indicating when the email notification associated
            with this payment was seen or opened by the customer or any other guest
            user. This field may be used to track when email notifications have been
            viewed.
        due_datetime:
          type:
            - string
            - "null"
          format: date-time
          title: Due date and time
          description:
            The date and time by which the payment is due. This field may
            be used to help remind the customer to complete the payment before the
            due date.
        notification_set:
          allOf:
            - $ref: "#/components/schemas/NotificationSet"
          readOnly: true
        expiration_time:
          type:
            - string
            - "null"
          description:
            If defined, any payment transactions created more than the
            specified period of time ago will be invalidated or expired if the customer
            attempts to complete them. By default, this expiration period is set to
            24 hours from the time of transaction creation. This feature helps ensure
            that payment transactions are processed promptly.
        shortify_attachment_url:
          type: boolean
          default: false
          description:
            If enabled, the attachment URL will be shortened using the
            configured URL shortener.
        receipt_short_url:
          type: string
          format: uri
          readOnly: true
          description:
            A short URL that links to the receipt associated with this
            payment. This URL may be included in email/sms notifications sent to the
            customer regarding their payment or displayed on the checkout page to
            allow the customer to easily access their receipt.
          maxLength: 2000
        invoice_pdf_url:
          type: string
          format: uri
          readOnly: true
        data:
          readOnly: true
          description: Used to store useful information for internal purposes
        bulk:
          allOf:
            - $ref: "#/components/schemas/Bulk"
          readOnly: true
        transaction_log_id:
          type:
            - integer
            - "null"
          maximum: 2147483647
          minimum: 0
          readOnly: true
          description:
            Identifies the transaction log associated with the payment
            transaction. A transaction log is created for each record that is dispatched
            during a bulk dispatch process.
        txns:
          type: array
          items:
            $ref: "#/components/schemas/ChildrenPayment"
          readOnly: true
          title: Child Transactions
        attempts:
          type: array
          items:
            $ref: "#/components/schemas/Attempt"
          readOnly: true
        notification_triggers:
          type: array
          items:
            $ref: "#/components/schemas/MailLog"
          readOnly: true
          title: Mail logs
        log_entries:
          allOf:
            - $ref: "#/components/schemas/LogEntry"
          readOnly: true
        iata_records:
          allOf:
            - $ref: "#/components/schemas/IATARecord"
          readOnly: true
      required:
        - amount
        - attempts
        - bulk
        - created
        - currency_code
        - customer_billing_address
        - data
        - delivery_fee
        - email_seen_at
        - fee
        - gateway_code
        - iata_records
        - id
        - initiator
        - invalidation_reason
        - invoice_pdf_url
        - is_amount_editable
        - is_sandbox
        - log_entries
        - modified
