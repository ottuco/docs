  /b/pbl/v2/inquiry/:
    post:
      operationId: inquiry
      description:
        "The Check Status-Inquiry endpoint is part of our Payment Gateway
        API. It's designed for checking the status of a specific payment transaction.
        This endpoint is particularly useful when notifications about a transaction
        status change haven't been received. It acts as a manual check for confirming
        the payment status, mirroring the structure of a payment webhook notification.
        \n\nThe Inquiry operation can only be triggered for payment transactions in
        the `pending`, `attempted`, `failed`, or `expired` states. If the transaction
        state is already `paid` or `authorized`, the response is returned immediately
        without re-confirming it with third-party Payment Gateways (PGs). However,
        if the system isn't up to date and the transaction state is still in one of
        the mentioned states, Ottu will trigger an API call to the PG to update the
        transaction state. If multiple payment options were attempted using different
        PGs, all PGs supporting payment status checks will be called, ensuring the
        merchant receives the most updated status of the payment. \n\nThis endpoint
        uses a throttling mechanism to prevent potential system abuse. Throttling
        rules are as follows:\n\n1. **Initial Grace Period (10 minutes):** If the
        Inquiry endpoint is called within 10 minutes from when the payment transaction
        is created, the request will be throttled.\n\n2. **First Request:** Once the
        initial grace period has passed, the first request is allowed. Subsequent
        requests for the same transaction within the next 30 minutes will be throttled.\n\n3.
        **Second Request:** After the end of the first throttle period, a second request
        is permitted. Further requests for the same transaction within another 30
        minutes from the second request are throttled.\n\n4. **Subsequent Requests:**
        If the number of requests for the same transaction exceeds three within the
        overall time frame, any further requests are denied.\n\nNote: The above rules
        are applied per transaction. Additionally, the endpoint allows a maximum of
        30 requests per minute across all transactions.\n\nIt's mandatory to provide
        at least one of the identifiers (`session_id` or `order_no`)."
      summary: Check Status-Inquiry
      parameters:
        - in: header
          name: Authorization
          schema:
            type: string
            default: Api-Key vSUmxsXx.V81oYvOWFMcIywaOu57Utx6VSCmG11lo
          description: Private API key to be provided in the format `Api-Key <key>`.
          required: true
      tags:
        - Payment Operations
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Inquiry"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/Inquiry"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/Inquiry"
      security:
        - basicAuth: []
        - tokenAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchemaWebhook"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InquiryErrors"
          description: ""
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericErrorMessage"
          description: ""
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericErrorMessage"
          description: ""
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericErrorMessage"
          description: ""
        "415":
          content:
