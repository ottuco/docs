    Success:
      oneOf:
        - $ref: "#/components/schemas/CheckoutPOSTResponse"
        - $ref: "#/components/schemas/DirectPaymentResponse"
    TabbyPrePaymentCheck:
      type: object
      properties:
        is_available:
          type: boolean
          default: true
    TalyPrePaymentCheck:
      type: object
      properties:
        is_available:
          type: boolean
          default: true
    TamaraPrePaymentCheck:
      type: object
      properties:
        single_checkout_enabled:
          type: boolean
        is_available:
          type: boolean
        payment_labels:
          type: array
          items:
            $ref: "#/components/schemas/PaymentLabel"
      required:
        - is_available
        - payment_labels
        - single_checkout_enabled
    TokenPayInstrument:
      type: object
      description: Token-based payment instrument for auto-debit
      properties:
        instrument_type:
          enum:
            - token
          type: string
          x-spec-enum-id: 961e6cfa88079418
          default: token
          description: |-
            Payment type: Token (Auto-Debit)

            * `token` - token
        payload:
          allOf:
            - $ref: "#/components/schemas/TokenPayPayload"
          description: Token for auto-debit payment. Provide the payment token or CVV code as received from your tokenization service.
      required:
        - payload
    TokenPayPayload:
      type: object
      description: Payload for token-based payment (auto-debit)
      properties:
        token:
          type: string
          description: Payment token or CVV code for auto-debit tokenization.
      required:
        - token
    UserCards:
      type: object
      properties:
        type:
          enum:
            - sandbox
            - production
          type: string
          x-spec-enum-id: df081db980375d31
          description: |-
            Choose between `sandbox`, `production`. To retrieve the cards associated to specified environment type.Payment Gateway MIDs, or production to fetch real cards used in live transactions.

            * `sandbox` - Sandbox
            * `production` - Production
        customer_id:
          type: string
          description: Retrieve cards associated with a specific customer using their unique customer_id.
        pg_codes:
          type: array
          items: {}
          description: Specify the `pg_code` if you want to retrieve cards for a particular payment gateway, such as `credit-card`. The pg_code is initialized in the `Checkout API` when the `session_id` is created, with each card being associated with a single payment gateway/pg_code.
        agreement_id:
          type: string
          description: Retrieve the card associated with a specific agreement ID. When this parameter is provided, the resulting array will contain a maximum of one entry, representing the latest card the customer has used for the auto-debit payment associated with the given agreement ID.
      required:
        - customer_id
        - type
