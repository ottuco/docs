          type: string
          readOnly: true
          description:
            Specifies the type of operation to be performed by the payment
            gateway. If set to `purchase`, the payment source will be directly charged.
            If set to `authorize`, the payment source will only be authorized and
            the actual charge will be made at a later time.
        order_no:
          type: string
          description:
            The unique identifier assigned to this payment transaction.
            It is used for tracking purposes and is set by the merchant or the system.
          maxLength: 128
        payment_instrument:
          $ref: "#/components/schemas/PaymentInstrument"
        payment_methods:
          allOf:
            - $ref: "#/components/schemas/PaymentMethodsForRedirect"
          readOnly: true
          description:
            An array containing all the payment methods derived from the
            `pg_codes` input. Each object in the array contains information about
            a single payment gateway, including its icon and the `redirect_url` that
            will redirect the customer to the payment gateway's payment page.
        payment_type:
          enum:
            - one_off
            - auto_debit
            - save_card
          type: string
          x-spec-enum-id: b2ae60f7918918e7
          default: one_off
          description:
            "Type of payment. Choose `one_off` for payments that occur
            only once without future commitments. Choose `auto_debit` for payments
            that are automatically deducted, such as recurring subscriptions, installments,
            or unscheduled auto-debits. \n\nChoose `save_card` if you want to perform
            a card tokenization operation.\n\nNOTE: If `auto_debit` is selected: \n1.
            `agreement` and `customer_id` parameters will also be mandatory. \n2.
            Only PG codes supporting tokenization can be selected. \nAs a side effect,
            the card used for the payment will be associated with the supplied `agreement.id`.
            This card will be locked, preventing the customer from deleting it from
            the system until an alternate card is chosen for auto-debit payments.\n\nNOTE:
            If `save_card` is selected: \n1. The amount must be zero for the save
            card operation. \n2. The selected MID(pg_code) must support tokenization
            to enable the save card operation. \n3. Please note that the save card
            operation is considered successful without any funds being charged.\n4.
            Once a card is created, Ottu will send a webhook containing the card details
            to the merchant's webhook URL.\n5. When the transaction type is `save_card`,
            all previously saved cards returned in the sdk_preload_payload should
            be hidden since the user is saving a new card and does not need to select
            from existing ones.\n\n* `one_off` - One Off\n* `auto_debit` - Auto Debit\n*
            `save_card` - Save Card"
        preload_checkout_page:
          type: boolean
          writeOnly: true
          default: false
          description:
            Pre-populate checkout page cache on transaction creation (POST
            only). Improves performance when clients immediately poll for the checkout
            page after creation. Ignored on updates (PATCH/PUT) - cache is automatically
            invalidated on any update. The cache expires based on the transaction's
            expiration time (max 1 hour).
        product_type:
          type: string
          description:
            The type of product or service being purchased. This field
            may be used for tracking and reporting purposes.
          maxLength: 128
        qr_code_url:
          type: string
          format: uri
          readOnly: true
          description:
            A QR code that, when scanned, redirects to the checkout page
            for this payment. This QR code may be displayed on invoices, receipts,
            or other documents to allow customers to easily access the checkout page
            and make a payment. This parameter is only present when `generate_qr_code`
            is set to true.
        redirect_url:
          type: string
          format: uri
          description:
            The URL where the customer will be redirected after the payment
            stage only if the webhook URL returns a success status. `order_no`, `reference_number`
            and `session_id` will be appended to the redirect URL as query parameters.
          maxLength: 2000
        sdk_setup_preload_payload:
          allOf:
            - $ref: "#/components/schemas/CheckoutSDK"
          readOnly: true
          default: false
          description:
            A JSON object containing preloaded data required to initialize
            the checkout interface.This includes essential details such as customer
            information, available payment methods.and specific transaction details,
            all formatted according to the Checkout SDK's initialization specifications.This
            field streamlines the checkout process by providing necessary information
            upfront.enhancing user experience and efficiency.
        session_id:
          type: string
          readOnly: true
          description:
            A unique identifier for each payment transaction, used to maintain
            the session state during the payment process.
        settled_pg_code:
          type: string
          readOnly: true
          title: Final Payment Gateway
          description:
            The code of the payment gateway used for completing the transaction.
            This field indicates the specific gateway that processed and settled the
            payment, providing clarity on which payment service was ultimately utilized
            for this transaction.
        shipping_excl_tax:
          type: string
          format: decimal
          title: Shipping Excl. Tax
          description: The cost of shipping for the invoice, excluding taxes.
        shipping_incl_tax:
          type: string
          format: decimal
          title: Shipping Incl. Tax
          description:
            The cost of shipping for the invoice, including all applicable
            taxes.
        shipping_method:
          type: string
          description:
            The method or service used for shipping the items associated
            with the invoice.
        shipping_tax_rate:
          type: string
          format: decimal
          description:
            "The tax rate applied to the shipping cost, expressed as a
            percentage. "
        shortify_attachment_url:
          type: boolean
          writeOnly: true
          default: false
          description:
            If set to True, the URL of the uploaded attachment will be
            shortened using a URL shortener service. This should be used when sharing
            the attachment URL via SMS or WhatsApp.
        shortify_checkout_url:
          type: boolean
          writeOnly: true
          default: false
          description:
            If set to True, the checkout URL will be shortened using a
            URL shortener service. This should be used when sharing the payment URL
            via SMS or WhatsApp.
        state:
          enum:
            - created
            - pending
            - attempted
            - authorized
            - paid
            - failed
            - canceled
            - expired
            - invalided
            - refunded
            - cod
          type: string
          x-spec-enum-id: caee163196dbc11f
          readOnly: true
          description: |-
            The current state of the payment transaction, it helps to understand the progress of the payment.

            * `created` - Created
            * `pending` - Pending
            * `attempted` - Attempted
            * `authorized` - Authorized
            * `paid` - Paid
            * `failed` - Failed
            * `canceled` - Canceled
            * `expired` - Expired
            * `invalided` - Invalided
            * `refunded` - Refunded
            * `cod` - Cash on Delivery
        status:
