        - non_master_unit_config
        - notification_set
        - notification_triggers
        - operation
        - paid_amount
        - payment_service
        - payment_url
        - qr_code_url
        - receipt_short_url
        - refunded_amount
        - seen_at
        - service_code
        - session_id
        - settled_amount
        - short_url
        - state
        - state_changed_at
        - transaction_log_id
        - txns
        - type
        - unit_config
        - voided_amount
    PaymentGatewayInfo:
      type: object
      description:
        Information about the payment gateway, accompanied by the response
        received from the payment gateway.
      properties:
        pg_code:
          type: string
          description:
            The unique identifier, or `pg_code`, for the payment gateway
            that was used to process the payment. This value corresponds to the specific
            payment method utilized by the customer, such as `credit-card`.
        pg_name:
          type: string
          description:
            The name of the payment gateway, represented in all lowercase
            letters, that was used to perform the payment. This could be one of several
            values, such as `kpay` (for KNET), `mpgs`, or `cybersource`. These identifiers
            provide a human-readable way to understand the payment mechanism that
            was utilized.
        pg_response:
          type: object
          additionalProperties: {}
          description:
            The raw response data that was received directly from the payment
            gateway after the transaction attempt. This typically includes transaction
            status, transaction identifier, and potentially error messages or additional
            data provided by the gateway.
      required:
        - pg_code
        - pg_name
        - pg_response
    PaymentInstrument:
      oneOf:
        - $ref: "#/components/schemas/ApplePayInstrument"
        - $ref: "#/components/schemas/GooglePayInstrument"
        - $ref: "#/components/schemas/TokenPayInstrument"
        - $ref: "#/components/schemas/SamsungPayInstrument"
    PaymentLabel:
      type: object
      properties:
        payment_type:
          type: string
        instalment:
          type: integer
        description_en:
          type: string
        description_ar:
          type: string
      required:
        - description_ar
        - description_en
        - instalment
        - payment_type
    PaymentMethod:
      type: object
      properties:
        displayName:
          type: string
        network:
          type: string
        type:
          type: string
      required:
        - displayName
        - network
        - type
    PaymentMethodData:
      type: object
      description: https://developers.google.com/pay/api/web/reference/response-objects#PaymentMethodData
      properties:
        type:
          type: string
          description: The type of payment method data.
        description:
          type: string
          description: The description of the payment method.
        info:
          type: object
          additionalProperties: {}
          description: The payment method info.
        tokenizationData:
          type: object
          additionalProperties: {}
          description: The tokenization data.
      required:
        - description
        - info
        - tokenizationData
        - type
    PaymentMethods:
      oneOf:
        - $ref: "#/components/schemas/Redirect"
        - $ref: "#/components/schemas/OttuPG"
    PaymentMethodsForRedirect:
      type: object
      properties:
        code:
          type: string
          description: The slug code of the payment method.
          pattern: ^[-a-zA-Z0-9_]+$
        name:
          type: string
          description: The name of the payment method.
        type:
          enum:
            - e_commerce
            - payment_request
          type: string
          x-spec-enum-id: ad398830c7970f0a
          description: |-
            The type of the payment transaction.

            * `e_commerce` - Ecommerce
            * `payment_request` - Payment Request
        amount:
          type: string
          description: The total amount to be charged, including fees.
        currency_code:
          type: string
          description:
            The currency code for the payment method represented as an
            ISO 4217 code.
          maxLength: 3
        fee:
          type: string
          description: The fee charged by the payment gateway.
        fee_description:
          type: string
          description:
            This field provides the label for any additional transaction
            fee. In the SDK, this label will be displayed prominently during the checkout
            process to inform the payer about the nature of the fee. Ensure to incorporate
            this field in a clear and visible manner within the checkout UI to maintain
            transparency with the end-users.
        icon:
          type: string
          format: uri
          description: The svg URL of the icon for the payment method.
        icons:
          allOf:
            - $ref: "#/components/schemas/Icons"
          description: The URLs of the icon for the payment method.
        pg_icons:
          allOf:
            - $ref: "#/components/schemas/MIDIcon"
          description: Represents list of mid icons configured for `pgmid` settings
        flow:
          type: string
          default: redirect
          description: The flow type of the payment method.
        redirect_url:
          type:
            - string
            - "null"
          format: uri
          description:
            The URL where the customer should be redirected to perform
            the payment.
      required:
        - amount
        - code
        - currency_code
        - fee
        - fee_description
        - icon
        - icons
        - name
        - type
    PaymentMethodsRequest:
      type: object
      properties:
        plugin:
          type: string
          description:
            Payment methods will be curated based on their compatibility
            with the specified plugin.
          maxLength: 50
        currencies:
          type: array
          items: {}
          description:
            "Specify the three-letter ISO 4217 codes representing the desired
            currencies. Examples include USD for United States Dollar, EUR for Euro,
            and GBP for British Pound Sterling. Example: ['KWD','USD']"
        customer_id:
          type: string
          description:
            If provided, `customer_payment_methods` will be filtered to
            show only those payment methods that have been successfully used with
            a paid payment attempts by this customer in the past.
          maxLength: 64
        operation:
          enum:
            - purchase
            - authorize
          type: string
          x-spec-enum-id: 4e59e52f76e448b3
          description: |-
            When specified, the available payment methods will be refined based on their compatibility with the indicated operation.

            * `purchase` - purchase
            * `authorize` - authorize
        tokenizable:
          type: boolean
          description:
            If defined, payment methods will be filtered based on supporting
            tokenization and auto-debit action.
        auto_debit:
          type: boolean
          description:
            If defined, payment methods will be filtered based on supporting
            tokenization and auto-debit action.
        pg_names:
          type: array
          items: {}
          description: |-
            When provided, the payment methods will be narrowed down to those that support the specified payment gateway name. Example: ['kpay','mpgs']

            Available Values:<br><li>`abapayway` - ABA PayWay</li><br><li>`rajhi` - Alrajhi Bank</li><br><li>`amazon_pay` - Amazon Pay</li><br><li>`bambora` - Bambora</li><br><li>`benefit` - Benefit</li><br><li>`benefit_pay` - BenefitPay</li><br><li>`beyon_money` - BeyonMoney</li><br><li>`bookeey` - Bookeey</li><br><li>`burgan` - Burgan</li><br><li>`cod` - Cash</li><br><li>`cbk` - CBK</li><br><li>`ccavenues` - Ccavenues</li><br><li>`checkoutcom` - checkout.com</li><br><li>`cybersource` - CyberSource</li><br><li>`csuc` - Cybersource Unified Checkout</li><br><li>`dapi` - Dapi</li><br><li>`deema` - Deema</li><br><li>`doku` - Doku</li><br><li>`enet` - Enet</li><br><li>`fawry` - Fawry</li><br><li>`fiserv` - Fiserv</li><br><li>`fss` - FSS</li><br><li>`hesabe` - Hesabe</li><br><li>`hyperpay` - HyperPay</li><br><li>`kpay` - KNET</li><br><li>`moyasar` - Moyasar</li><br><li>`mpgs` - MPGS</li><br><li>`myfatoorah` - MyFatoorah</li><br><li>`ngenius` - N-Genius</li><br><li>`nbo` - NBO</li><br><li>`omannet` - OmanNet</li><br><li>`ottu_pg` - Ottu PG</li><br><li>`paymob` - PayMob</li><br><li>`payon` - PayOn</li><br><li>`paypal` - PayPal</li><br><li>`payu_india` - PayU India</li><br><li>`qpay` - Qpay</li><br><li>`skipcash` - Skip Cash</li><br><li>`smart_pay` - SmartPay</li><br><li>`sohar` - SoharInternational</li><br><li>`stcbahrain` - STC Bahrain</li><br><li>`stc_pay` - STC Pay</li><br><li>`tabby` - Tabby</li><br><li>`taly` - Taly</li><br><li>`tamara` - Tamara</li><br><li>`tap` - Tap Payments</li><br><li>`upayments` - UPayments</li><br><li>`upg` - UPG</li><br><li>`urpay` - URPay</li>
        type:
          enum:
            - sandbox
            - production
          type: string
          x-spec-enum-id: 1e8a9859ef5c2b8e
          description: |-
            When specified, the available payment methods will be refined based on their type determining if type is sandbox or production.

            * `sandbox` - sandbox
            * `production` - production
      required:
        - plugin
    PaymentMethodsResponse:
      type: object
      properties:
        customer_payment_methods:
          type: array
          items: {}
          description:
            Denotes a collection of payment gateways which used by user
            in successful payment attempts.
        payment_methods:
          type: array
          items:
            $ref: "#/components/schemas/PGPaymentMethods"
          description:
            Provides a comprehensive overview of the available payment
            gateways, delineated as distinct payment methods.
    PaymentNotificationErrors:
      oneOf:
        - $ref: "#/components/schemas/FieldErrors"
        - $ref: "#/components/schemas/MessageNotificationFailure"
    PaymentNotificationResponses:
