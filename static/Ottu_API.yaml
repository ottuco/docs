  /b/pbl/v2/notifications/send/{channel}/:
    post:
      operationId: send_specific_notification
      description: |+
        This API endpoint sends notifications via the specified channel (email, SMS, or WhatsApp) for a given template.

        The template_id (provided in the request body) identifies the notification template to use. The notification channel is specified as part of the URL path (/notifications/send/{channel}/). This API allows you to manually trigger notifications for specific templates and channels. The available channels are email, SMS, and WhatsApp. The API will initiate the notification process If the specified channel is configured and the corresponding notification event exists for the given template.

        The API response includes details about the notification, a user-friendly message, and a channel indicator. A message indicates that the notification process was initiated successfully.

      summary: Channel Specific Notifications
      parameters:
        - in: header
          name: Authorization
          schema:
            type: string
            default: Api-Key vSUmxsXx.V81oYvOWFMcIywaOu57Utx6VSCmG11lo
          description: Private API key to be provided in the format `Api-Key <key>`.
          required: true
        - in: path
          name: channel
          schema:
            type: string
            enum:
              - email
              - sms
              - whatsapp
          description: Specify the channel of notification to send.
          required: true
      tags:
        - Communication Notifications
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChannelSpecificNotification"
            examples:
              Email:
                value:
                  template_id: communication-notification-email
                  language: en
                  context:
                    communication_message: Simple Message
                    extra_info: extra_info
                  to: initial_user@domain.com
                  cc:
                    - user@domain.com
                    - user2@domain.com
                  bcc:
                    - user3@domain.com
                  body: This is plain text body.
                  attachments:
                    - filename: Example_File.pdf
                      content: base64_encoded_file_content
                      content_type: application/pdf
                    - filename: Example_data.csv
                      content: base64_encoded_file_content
                      content_type: plain/text
                summary: Email
              SMS:
                value:
                  channel: sms
                  template_id: communication-notification-sms
                  language: en
                  context:
                    communication_message: Simple Message
                    extra_info: extra_info
                  to: "+96599999999"
                summary: SMS
              WHATSAPP:
                value:
                  channel: whatsapp
                  template_id: communication-notification-whatsapp
                  unit_config: unit-config-identifier
                  language: en
                  context:
                    communication_message: Simple Message
                    extra_info: extra_info
                  to: "+96599999999"
                summary: WhatsApp
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/ChannelSpecificNotification"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ChannelSpecificNotification"
