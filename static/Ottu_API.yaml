        - billing
        - can_save_card
        - code
        - currency_code
        - fee
        - fee_description
        - flow
        - icon
        - icons
        - name
        - type
    Redirect3DSResponse:
      type: object
      properties:
        status:
          type: string
          readOnly: true
          default: 3DS
          description:
            The payment is in 3DSecure process. Indicates a 3D Secure verification
            is required. html must be displayed to the customer in the iframe.
        reference_number:
          type: string
          readOnly: true
          description:
            This is a unique value associated with each payment transaction
            made by a customer. It serves as the unique identifier for the payment
            when sent to the Payment Gateway (PG). allowing for multiple reference
            numbers per session_id.
        form_of_payment:
          enum:
            - apple_pay
            - google_pay
            - token_pay
            - stc_pay
            - urpay
            - redirect
            - samsung_pay
            - doku
            - aba_payway
          type: string
          x-spec-enum-id: d21d329ca6d31930
          readOnly: true
          description: |-
            Indicates the form of payment used to process the transaction. This can be one of several options, including `apple_pay`, `google_pay`, `samsung_pay`, `token_pay`, `stc_pay`, `urpay`, or `redirect`.It's important to note that the `redirect` option is only present in the `errorCallback`. In other scenarios, especially with `cancelCallback` and `successCallback`, it's absent. This is because, in the redirect flow, the customer is redirected to a different page where actions like payment cancellation or confirmation occur, not on the page where the SDK is displayed.

            * `apple_pay` - Apple Pay
            * `google_pay` - Google Pay
            * `token_pay` - Token Pay
            * `stc_pay` - STC Pay
            * `urpay` - URPay
            * `redirect` - Redirect
            * `samsung_pay` - Samsung Pay
            * `doku` - Doku
            * `aba_payway` - ABA PayWay
        challenge_occurred:
          type: boolean
          default: true
          description:
            This flag indicates if an additional verification, such as
            3DS, OTP, PIN, etc., was initiated during the payment process. Use this
            flag in cancelCallback and errorCallback to control the presentation of
            error messages, especially for on-site payments undergoing a challenge
            flow. For example, after a failed 3DS verification, it's useful to show
            a custom popup informing the user of the payment failure. However, it's
            crucial to note that not all on-site failed payments need custom error
            messaging. In cases like GooglePay or ApplePay, error messages are inherently
            handled by the Payment Sheet, which remains open for the user to retry,
            making this distinction vital.
        method:
          type: string
          readOnly: true
          default: redirect
          description: The method of 3D Secure verification.
        redirect_url:
          type: string
          format: uri
          readOnly: true
          description: |-
            The URL where the payer shall be redirected for 3D Secure verification.

            **Platform-specific behavior based on the `channel` HTTP header:**

            ### For Web (`web_sdk`):
            The payer will be redirected to the payment details page where they can complete the payment process.

            Use the following JavaScript code:
            ```javascript
            window.location.href = redirect_url;
            ```
            The browser will handle all subsequent redirects automatically.

            ### For Mobile SDK (`mobile_sdk`):
            The `redirect_url` should be opened in a WebView. This is the page where the payer will enter their card details.

            - After card details are entered, the payer is redirected to the final payment details page within the WebView.
            - You must detect URL changes within the WebView. When a redirect occurs to the URL pattern:
            `{merchant_id}/b/gw/mobile-sdk-redirect`, close the WebView.
            - This URL indicates the end of the payment process. It will appear as a blank page and should not be shown to the user.
            - After closing the WebView, reload the SDK and call the Retrieve Init Data API to present the payment result to the payer.

            **Important:**
            Ensure the `channel` HTTP header is set correctly (`web_sdk` or `mobile_sdk`) to enable the appropriate behavior. Incorrect or missing `channel` headers may result in improper handling of the redirection flow.
        order_no:
          type: string
          readOnly: true
          description:
            The unique identifier assigned to this payment transaction.
            It is used for tracking purposes and is set by the merchant or the system.
        session_id:
          type: string
          readOnly: true
          description:
            A unique identifier for each payment transaction, used to maintain
            the session state during the payment process.
      required:
        - form_of_payment
        - method
        - order_no
        - redirect_url
        - reference_number
        - session_id
        - status
