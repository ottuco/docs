    ShortenedURL:
      type: object
      properties:
        short_url:
          type: string
          description:
            The shortened version of the original URL. When accessed, it
            redirects to the full long URL.
        long_url:
          type: string
          description: The URL provided to endpoint to shorten it.
      required:
        - long_url
        - short_url
    SubmitClickToPay:
      type: object
      description: |-
        Serializer for provisioning Click to Pay configuration.

        This is used before actual payment to provide configuration to the frontend.
      properties:
        pg_code:
          type: string
          description: Payment Gateway code selected for Click to Pay.
        session_id:
          type: string
          description: Session ID used to identify the transaction.
      required:
        - pg_code
        - session_id
    SubmitSMSPaymentPaymentRequest:
      type: object
      properties:
        session_id:
          type: string
          description:
            A unique identifier for each payment transaction, used to maintain
            the session state during the payment process.
          maxLength: 128
        otp:
          type: string
          description:
            The OTP (One-Time Password) is a mandatory field used to authorize
            SMS Payment payment transactions.
          maxLength: 12
      required:
        - otp
        - session_id
    SubmitToken:
      type: object
      description: |-
        This serializer is responsible for validating the data sent by the SDK
        when the user submits the token.
      properties:
        session_id:
          type: string
          description:
            The unique identifier of the payment session. Provided in CheckoutSDK
            init `session_id`.
        token:
          type: string
          description:
            Use this field to provide the unique identifier of a saved
            customer card for processing a payment in the API request.
        cvv:
          type: string
          description:
            Input the 3 or 4-digit Card Verification Value (CVV) found
            on the back of the credit/debit card. This may be required for new card
            transactions or certain token transactions to verify the card's authenticity.
          pattern: ^\d{3,4}$
      required:
        - session_id
        - token
    Success:
      oneOf:
        - $ref: "#/components/schemas/CheckoutPOSTResponse"
        - $ref: "#/components/schemas/DirectPaymentResponse"
