          type: string
          description:
            A unique identifier for the invoice, typically used for tracking
            and referencing purposes.
          maxLength: 255
        pg_codes:
          type: array
          items:
            type: string
          title: Gateway
          description:
            The list of payment gateway codes from which a customer can
            select to perform the payment
