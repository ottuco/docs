    PGPaymentMethods:
      type: object
      properties:
        code:
          type: string
          readOnly: true
          description:
            Indicates the unique code associated with the payment gateway.
            This pivotal identifier facilitates transaction initiation through both
            the dashboard and API.
        name:
          type: string
          readOnly: true
          description: Represents the payment gateway internal name defined in Ottu.
        is_sandbox:
          type: boolean
          readOnly: true
          description:
            Indicates whether this payment gateway operates in a sandbox
            or production environment.
        logo:
          type: string
          format: uri
        wallets:
          type: array
          items: {}
          readOnly: true
          default:
            - ApplePay
            - GooglePay
          description:
            Denotes a list of payment services linked with this payment
            gateway, such as `GooglePay` and `ApplePay`
        default_currency:
          type: string
          readOnly: true
          default: KWD
          description:
            Specifies the default currency code for the payment gateway,
            formatted according to ISO 4217.
        accepted_currencies:
          type: array
          items: {}
          readOnly: true
          default:
            - KWD
            - USD
          description:
            Indicates a list of default accepted currencies for the payment
            gateway, each formatted in accordance with ISO 4217 standards.
        operation:
          type: string
          description:
            "Specifies the processing operation type for the payment method:
            either 'authorize' or 'purchase'. When set to `authorize`, successful
            transactions using this payment method will transition to the `authorize`
            state. Similarly, if set to `purchase`, they will follow the purchase
            flow."
        operations:
          type: array
          items: {}
          default:
            - refund
            - void
          readOnly: true
          description:
            Specifies the payment operations that are available for this
            payment gateway.
        is_tokenizable:
          type: boolean
          description:
            This flag indicates whether tokenization is enabled for this
            payment gateway. When set to true, it allows for the secure storage of
            payment details, enabling future transactions without the need for re-entering
            payment information.
        auto_debit_enabled:
          type: boolean
          description:
            This flag indicates whether auto-debit operation enabled or
            not.
      required:
        - accepted_currencies
        - auto_debit_enabled
        - code
        - default_currency
        - is_sandbox
        - is_tokenizable
