      description: |+
        This API endpoint sends notifications via the specified channel (email, SMS, or WhatsApp) for a given template.

        The template_id (provided in the request body) identifies the notification template to use. The notification channel is specified as part of the URL path (/notifications/send/{channel}/). This API allows you to manually trigger notifications for specific templates and channels. The available channels are email, SMS, and WhatsApp. The API will initiate the notification process If the specified channel is configured and the corresponding notification event exists for the given template.

