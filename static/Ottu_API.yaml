    CSUCSDKResponse:
      type: object
      description: |-
        Response serializer for CSUC (Cybersource Unified Checkout) SDK configuration.

        This response contains the complete configuration needed to initialize the
        Cybersource Unified Checkout widget on the frontend, including SDK loading
        information, form configuration, and the capture context JWT token.
      properties:
        sdk_client:
          allOf:
            - $ref: "#/components/schemas/SDKClientConfig"
          description:
            Configuration for loading the Cybersource JavaScript SDK. Contains
            the script URL, integrity hash for security, and CORS settings.
        form_config:
          allOf:
            - $ref: "#/components/schemas/FormConfig"
          description:
            Payment form configuration. Specifies where to submit the transient
            token after the user completes payment in the Cybersource widget.
        capture_context:
          type: string
          description: |-
            JWT capture context token required to initialize the Cybersource Unified Checkout. This token contains encrypted payment configuration including:
            - Allowed card networks (VISA, MASTERCARD, etc.)
            - Allowed payment types (CLICKTOPAY, PANENTRY)
            - Client version and locale settings
            - Capture mandate (billing type, email/phone/shipping requests)
            - Complete mandate (operation type: CAPTURE or AUTH, decision manager settings)
            - Order information (amount and currency)
            - Target origins for CORS
            - Payment configurations for SRC (Secure Remote Commerce) providers

            The token is cached for 10 minutes to improve performance.

            For more information, see: https://developer.cybersource.com/docs/cybs/en-us/unified-checkout/developer/all/rest/unified-checkout/uc-intro.html
      required:
        - capture_context
        - form_config
        - sdk_client
