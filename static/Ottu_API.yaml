    SamsungPay:
      type: object
      description:
        Base serializer for payment configuration, to be used in SDK clients
        like web and mobile.
      properties:
        code:
          type: string
          description: The payment service code.
          pattern: ^[-a-zA-Z0-9_]+$
        environment:
          enum:
            - TEST
            - PRODUCTION
            - STAGE
          type: string
          x-spec-enum-id: 3b7f3ed28de540a3
          description: |-
            This field specifies the environment to use for the payment, either `TEST`, `STAGE`or `PRODUCTION`. In the TEST environment, transactions are not processed and can be used to test the integration. In the PRODUCTION environment, transactions are processed and real money is involved

            * `TEST` - TEST
            * `PRODUCTION` - PRODUCTION
            * `STAGE` - STAGE
        product_id:
          type: string
          description:
            The Service ID obtained from the Samsung Pay partner portal
            (required for partner verification).This field specifies the ID of the
            merchant accepting the payment, This ID is used by Samsung Pay to identify
            the merchant and associate the payment transaction with the correct merchant
            account.
          maxLength: 100
        merchant_name:
          type: string
          description:
            This field specifies the name of the merchant accepting the
            payment. This name will be displayed to the user during the payment process
            and on their payment confirmation
          maxLength: 25
        total_price:
          type: string
          description:
            This field specifies the total price for the payment, including
            any fees. The price should be formatted as a string with the decimal point
            as a period, e.g. '10.99'.
          maxLength: 20
        session_id:
          type: string
          description: The unique session ID for the payment operation.
          maxLength: 50
        currency_code:
          type: string
          description:
            This field specifies the ISO 4217 currency code for the payment.
            This code is used to specify the currency of the payment transaction.
            If you are unsure what value to use for this field, please consult the
            documentation provided by your payment gateway provider.
          maxLength: 10
        country_code:
          type: string
          description:
            This field specifies the ISO 3166-1 alpha-2 country code for
            the payment currency. This code is used to specify the country of the
            payment transaction. If you are unsure what value to use for this field,
            please consult the documentation provided by your payment gateway provider.
          maxLength: 2
        fee:
          type: string
          description: The fee for the payment.
          maxLength: 20
        fee_description:
          type: string
          description:
            This field provides the label for any additional transaction
            fee. In the SDK, this label will be displayed prominently during the checkout
            process to inform the payer about the nature of the fee. Ensure to incorporate
            this field in a clear and visible manner within the checkout UI to maintain
            transparency with the end-users.
          maxLength: 128
        payment_url:
          type: string
          format: uri
          description: The URL to use for submitting the payment.
          maxLength: 2000
        flow:
          enum:
            - samsung_pay
          type: string
          x-spec-enum-id: 6d871e435f026f68
          description: |-
            The flow type of the payment method.

            * `samsung_pay` - SamsungPay
