    ClickToPaySubmitSuccessResponse:
      oneOf:
        - $ref: "#/components/schemas/DokuSDKResponse"
    ClientErrors:
      oneOf:
        - $ref: "#/components/schemas/FieldErrors"
        - $ref: "#/components/schemas/NestedFieldErrors"
        - $ref: "#/components/schemas/GenericErrorMessage"
        - $ref: "#/components/schemas/OperationErrorResponse"
    Customer:
      type: object
      description: Customer serializer for Ottu PG
      properties:
        id:
          type: string
          maxLength: 50
        first_name:
          type: string
          maxLength: 50
        last_name:
          type: string
          maxLength: 50
        email:
          type: string
          format: email
        phone:
          type: string
          maxLength: 50
      required:
        - email
        - first_name
        - id
        - last_name
        - phone
    CustomerBillingAddress:
      type: object
      properties:
        line1:
          type: string
          title: Address Line 1
        line2:
          type: string
          title: Address Line 2
        city:
          type: string
        state:
          type: string
        country:
          type: string
        postal_code:
          type: string
      required:
        - city
        - country
        - line1
        - line2
        - postal_code
        - state
    DevicePayView:
      oneOf:
        - $ref: "#/components/schemas/DevicePayViewSuccessResponse"
        - $ref: "#/components/schemas/IFrame3DSResponse"
    DevicePayViewCancelResponse:
      type: object
      description: |-
        Serializer for the response of the PayView of the payment services like
        Apple Pay, Google Pay, etc.
      properties:
        approved:
          type: boolean
          default: false
          description:
            Whether the payment was approved or not. For legacy purposes
            only, use `callback_payload` instead.
        message:
          type: string
          description:
            Informative message. For legacy purposes only, use `callback_payload`
            instead.
        callback_payload:
          allOf:
            - $ref: "#/components/schemas/SDKCancelCallback"
          description: This payload must be forwarded as is to `cancelCallback` method.
      required:
        - callback_payload
        - message
    DevicePayViewErrorResponse:
      type: object
      description: |-
        Serializer for the response of the PayView of the payment services like
        Apple Pay, Google Pay, etc.
      properties:
        approved:
          type: boolean
          default: false
          description:
            Whether the payment was approved or not. For legacy purposes
            only, use `callback_payload` instead.
        message:
          type: string
          description:
            Informative message. For legacy purposes only, use `callback_payload`
            instead.
        callback_payload:
          allOf:
            - $ref: "#/components/schemas/SDKErrorCallback"
          description: This payload must be forwarded as is to `errorCallback` method.
      required:
        - callback_payload
        - message
    DevicePayViewSuccessResponse:
      type: object
      description: |-
        Serializer for the response of the PayView of the payment services like
        Apple Pay, Google Pay, etc.

        The responses are aligned for all payment services.
      properties:
        approved:
          type: boolean
          default: true
          description:
            Whether the payment was approved or not. For legacy purposes
            only, use `callback_payload` instead.
        message:
          type: string
          description:
            Informative message. For legacy purposes only, use `callback_payload`
            instead.
        redirect_url:
          type: string
          format: uri
          description:
            The URL where the customer should be redirected to after the
            payment. For legacy purposes only, use `callback_payload` instead.
        callback_payload:
          allOf:
            - $ref: "#/components/schemas/SDKSuccessCallback"
          description: This payload must be forwarder as is to `successCallback` method.
      required:
        - callback_payload
        - message
    DirectApplePaymentErrors:
      oneOf:
        - $ref: "#/components/schemas/OperationErrorResponse"
        - $ref: "#/components/schemas/FieldErrors"
    DirectGooglePaymentErrors:
      oneOf:
        - $ref: "#/components/schemas/OperationErrorResponse"
        - $ref: "#/components/schemas/FieldErrors"
    DirectGooglePaymentSuccess:
      oneOf:
        - $ref: "#/components/schemas/SchemaWebhook"
        - $ref: "#/components/schemas/IFrame3DSResponse"
        - $ref: "#/components/schemas/Redirect3DSResponse"
    DirectPaymentResponse:
      type: object
      properties:
        pg_params:
          allOf:
            - $ref: "#/components/schemas/PGParams"
          readOnly: true
          description:
            "The `pg_params` field contains the details received \nfrom
            the payment gateway callback these details are \nprovided to us by the
            gateway after a user has completed \na payment transaction additionally,
            `pg_params` \ncan include information obtained from an inquiry \nrequest
            made to the payment gateway status check API. \n"
        agreement:
          allOf:
            - $ref: "#/components/schemas/Agreement"
          readOnly: true
          description:
            "An established contractual arrangement with the payer, which
            authorizes you to securely store and subsequently utilize their payment
            information for specific purposes. This could encompass arrangements like
            recurring payments for services such as mobile subscriptions, installment-based
            payments for purchases, arrangements for ad-hoc charges like account top-ups,
            or for standard industry practices like penalty charges for missed appointments.
            \n\nNote: If your intention is solely to store payment details for transactions
            initiated by the payer in the future, then this parameter group should
            not be used."
        amount:
          type: string
          readOnly: true
          description:
            Denotes the total sum of the payment transaction, which encompasses
            the cost of the procured items or services, excluding any supplementary
            fees or charges.
        amount_details:
          allOf:
            - $ref: "#/components/schemas/AmountDetails"
          readOnly: true
          description:
            "A comprehensive set of amount details includes: Currency Code,
            Amount, Total, Fee."
        capture_delivery_address:
          type: boolean
          description:
            By enabling this, you will ask for user's address. If enabled,
            capture delivery coordinates should also be active.
        capture_delivery_location:
          type: boolean
          title: Capture delivery coordinates
          description:
            "By enabling this, you will ask for user's delivery location
            on a map. "
        card_acceptance_criteria:
          allOf:
            - $ref: "#/components/schemas/CardAcceptanceCriteria"
          readOnly: true
          description: |-
            This field allows you to define specific rules and conditions that a card must meet to be eligible for payment. These stipulations apply regardless of whether a customer chooses to pay using a saved card or opts to add a new card for the transaction. By leveraging the `card_acceptance_criteria`, you gain the power to fine-tune your payment processing strategy, tailoring acceptance rules to align with your business needs, security standards, and risk management policies.

            **Example**: If you run an exclusive service that caters predominantly to premium customers, you might set criteria that only allow transactions from high-tier credit cards like VISA Platinum. This ensures that payments align with the exclusivity and branding of your services. Remember to configure these criteria thoughtfully. Striking the right balance between security, risk mitigation, and user experience is paramount.

            **Note**: The `card_acceptance_criteria` field is applicable only for direct payments and not for hosted session payments.
        currency_code:
          type: string
          description:
            The specified currency represents the denomination of the transaction.Nevertheless,
            it doesn't necessarily mandate payment in this exact currency.Due to potential
            currency conversions or exchanges, the final charge may be in a different
            currency.
          maxLength: 3
          minLength: 3
        customer_address_city:
          type: string
          description:
            The city of the customer's billing address. This field may
            be used to send the billing address to the payment gateway.
          maxLength: 40
        customer_address_country:
          type: string
          description:
            The country of the customer's billing address, formatted as
            a two-letter ISO country code (e.g., 'US' for United States, 'CA' for
            Canada). This field may be used to send the billing address to the payment
            gateway.
          maxLength: 2
          minLength: 2
        customer_address_line1:
          type: string
          title: Customer address line 1
          description:
            The first line of the customer's billing street address. This
            field may be used to send the billing address to the payment gateway.
        customer_address_line2:
          type: string
          title: Customer address line 2
          description:
            The second line of the customer's billing street address, if
            available. This field may be used to provide additional address information,
            such as an apartment or suite number.
        customer_birthdate:
          type:
            - string
            - "null"
          format: date
          description: The customer's date of birth in ISO format (YYYY-MM-DD).
        customer_address_postal_code:
          type: string
          description:
            The postal code of the customer's billing address. This field
            may be used to send the billing address to the payment gateway.
          maxLength: 12
        customer_address_state:
          type: string
          description:
            The state or region of the customer's billing address. This
            field may be used to send the billing address to the payment gateway.
          maxLength: 40
        customer_email:
          type: string
          description:
            The email address of the customer that is used to send payment
            notifications and receipts, and can be used for fraud prevention. This
            field is mandatory and is always sent to the payment gateway. It may also
            be included in the invoice, receipt, email, and displayed on the payment
            page.
          maxLength: 128
        customer_first_name:
          type: string
          description:
            The first name of the recipient of the payment. This field
            is used for various communications such as the invoice, receipt, email,
            SMS, or displayed on the payment page. It may also be sent to the payment
            gateway if necessary.
          maxLength: 64
        customer_id:
          type: string
          description:
            The customer ID is a unique identifier for the customer within
            the merchant's system. It is also used as a merchant identifier for the
            customer and plays a critical role in tokenization. All the customer's
            cards will be associated with this ID.
          maxLength: 64
        customer_last_name:
          type: string
          description:
            The last name of the recipient of the payment. This field is
            used for various communications such as the invoice, receipt, email, SMS,
            or displayed on the payment page. It may also be sent to the payment gateway
            if necessary.
          maxLength: 64
        customer_phone:
          type: string
          description:
            Customer phone number associated with the payment. This might
            be sent to the payment gateway and depending on the gateway, it may trigger
            a click to pay process on the payment page. The phone number will also
            be included in the invoice, receipt, email, and displayed on the payment
            page.
          maxLength: 32
        extra:
          description:
            The extra information for the payment details, which the merchant
            has sent it in key value form.
        fee:
          type: string
          description:
            The fee denotes the sum the customer pays in their chosen payment
            currency. This may vary from the transaction's designated currency. The
            fee is computed once to maintain precision and uniformity throughout the
            payment procedure.
          readOnly: true
        gateway_account:
          type: string
          readOnly: true
          description:
            This code corresponds to the payment gateway and plays an essential
            role in facilitating payment transactions.
        gateway_name:
          type: string
          readOnly: true
          description: The name of the payment gateway service being utilized.
        gateway_response:
          type: object
          additionalProperties: {}
          description:
            This field stores the processed response received from the
            payment gateway and forwarded to Ottu.
          readOnly: true
        initiator:
          allOf:
            - $ref: "#/components/schemas/InitiatorUser"
          description:
            The user who initiated the creation of this payment transaction,
            if available. This field is optional and may be used to track who created
            the payment transaction. Note that if the payment transaction was using
            API Key auth initiator_id can be set to any value that corresponds to
            an existing ACTIVE user in the system
        is_sandbox:
          type: boolean
          title: Is Sandbox?
          description:
            Indicates whether the operation was performed in a test environment
            or not.
        message:
          type: string
          readOnly: true
          description:
            This represents the message, either transmitted by the Payment
            Gateway (PG) or established by Ottu, that provides a detailed illustration
            of the payment's current status.
        order_no:
          type:
            - string
            - "null"
          description:
            The unique identifier assigned to this payment transaction.
            It is used for tracking purposes and is set by the merchant or the system.
          maxLength: 128
        paid_amount:
          oneOf:
            - type: number
              format: double
            - type: string
          description:
            The paid amount encompasses fees or captured amounts from authorized
            transactions. This total is derived from the specified 'amount' field,
            converting foreign currencies to the default as necessary. This might
            result in minor variations due to fluctuations in exchange rates.
          readOnly: true
        payment_type:
          enum:
            - one_off
            - auto_debit
            - save_card
          type: string
          x-spec-enum-id: b2ae60f7918918e7
          description:
            "Type of payment. Choose `one_off` for payments that occur
            only once without future commitments. Choose `auto_debit` for payments
            that are automatically deducted, such as recurring subscriptions, installments,
            or unscheduled auto-debits. \n\nChoose `save_card` if you want to perform
            a card tokenization operation.\n\nNOTE: If `auto_debit` is selected: \n1.
            `agreement` and `customer_id` parameters will also be mandatory. \n2.
            Only PG codes supporting tokenization can be selected. \nAs a side effect,
            the card used for the payment will be associated with the supplied `agreement.id`.
            This card will be locked, preventing the customer from deleting it from
            the system until an alternate card is chosen for auto-debit payments.\n\nNOTE:
            If `save_card` is selected: \n1. The amount must be zero for the save
            card operation. \n2. The selected MID(pg_code) must support tokenization
            to enable the save card operation. \n3. Please note that the save card
            operation is considered successful without any funds being charged.\n4.
            Once a card is created, Ottu will send a webhook containing the card details
            to the merchant's webhook URL.\n5. When the transaction type is `save_card`,
            all previously saved cards returned in the sdk_preload_payload should
            be hidden since the user is saving a new card and does not need to select
            from existing ones.\n\n* `one_off` - One Off\n* `auto_debit` - Auto Debit\n*
            `save_card` - Save Card"
        reference_number:
          type: string
          readOnly: true
        refunded_amount:
          type: number
          format: double
          description: The total refunded amount for the payment transaction.
        remaining_amount:
          type: number
          format: double
          description:
            The residual amount due. Together with the editable amount,
            it indicates the outstanding balance of a transaction awaiting settlement.
          readOnly: true
        result:
          enum:
            - pending
            - success
            - failed
            - canceled
            - error
            - cod
          type: string
          description:
            Indicates the outcome of the operation. `success` denotes a
            successful operation.
          x-spec-enum-id: 03c10fdf706d3f9a
          readOnly: true
        session_id:
          type: string
          description:
            A unique identifier for each payment transaction, used to maintain
            the session state during the payment process.
          maxLength: 128
        settled_amount:
          type: number
          format: double
          description:
            The amount that has been paid or authorized in its original
            currency, excluding any fees.
          readOnly: true
        signature:
          type: string
          readOnly: true
          description:
            "Signature Field: A cryptographic hash used to guarantee data
            integrity and authenticity during client-server exchanges. This hash ensures
            that the API payload has not been tampered with, and can only be verified
            by authorized parties."
        state:
          type: string
          readOnly: true
        token:
          allOf:
            - $ref: "#/components/schemas/Card"
          description: |-
            Please note that if card is created via checkout save_card payment type

            It means card is created via successful operation without any funds charged.

            For more details check Checkout API `payment_type` field documentation details
        transaction_log_id:
          type:
            - integer
            - "null"
          maximum: 2147483647
          minimum: 0
          description:
            Identifies the transaction log associated with the payment
            transaction. A transaction log is created for each record that is dispatched
            during a bulk dispatch process.
        timestamp_utc:
          type: string
          format: date-time
          readOnly: true
          description:
            This field represents the timestamp at which ottu processed
            the transaction.While this often corresponds to the payment time,it's
            important to note that it might not always be the case.Payments can be
            acknowledged at a later time,so this timestamp might not align precisely
            with the actual payment time.
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/ChildPayment"
          description:
            A list of dictionaries is generated, each containing a concise
            summary of each child payment transaction that has been created.
        voided_amount:
          type: number
          format: double
          description: The total voided amount for the payment transaction.
      required:
        - agreement
        - amount
        - amount_details
        - card_acceptance_criteria
        - currency_code
        - customer_address_country
        - fee
        - gateway_account
        - gateway_name
        - gateway_response
        - message
        - paid_amount
        - pg_params
        - reference_number
        - remaining_amount
        - result
        - settled_amount
        - signature
        - state
        - timestamp_utc
    DokuSDK:
      type: object
      description: Serializer for Click to Pay payment flow.
      properties:
        code:
          type: string
          description: The slug code of the payment method.
          pattern: ^[-a-zA-Z0-9_]+$
        name:
          type: string
          description: The name of the payment method.
        type:
          enum:
            - e_commerce
            - payment_request
          type: string
          x-spec-enum-id: ad398830c7970f0a
          description: |-
            The type of the payment transaction.

            * `e_commerce` - Ecommerce
            * `payment_request` - Payment Request
        amount:
          type: string
          description: The total amount to be charged, including fees.
        currency_code:
          type: string
          description:
            The currency code for the payment method represented as an
            ISO 4217 code.
          maxLength: 3
        fee:
          type: string
          description: The fee charged by the payment gateway.
        fee_description:
          type: string
          description:
            This field provides the label for any additional transaction
            fee. In the SDK, this label will be displayed prominently during the checkout
            process to inform the payer about the nature of the fee. Ensure to incorporate
            this field in a clear and visible manner within the checkout UI to maintain
            transparency with the end-users.
        icon:
          type: string
          format: uri
          description: The svg URL of the icon for the payment method.
        icons:
          allOf:
            - $ref: "#/components/schemas/Icons"
          description: The URLs of the icon for the payment method.
        pg_icons:
          allOf:
            - $ref: "#/components/schemas/MIDIcon"
          description: Represents list of mid icons configured for `pgmid` settings
        flow:
          enum:
            - doku
          type: string
          description: "* `doku` - Doku"
          x-spec-enum-id: caab68c0e0a434b4
          default: doku
        redirect_url:
          type: string
          format: uri
          description:
            "This field is used for the `ottu_pg` payment flow. When `flow`
            is `ottu_pg`, the payer will be directly redirected to this URL. This
            field is only present when `flow` is `ottu_pg`. For web integrations:
            Use `window.location.href = redirect_url` to redirect the payer to the
            specified URL. For mobile SDK integrations: Open the `redirect_url` in
            the webview. Upon redirecting to the provided URL, the webview should
            be closed and the transaction refreshed using the `Checkout SDK / Retrieve
            init data API`. Detect the URL redirection by listening to redirects in
            the webview. When a redirect occurs to a URL containing the `merchant_id`
            domain, close the webview and reload the SDK after calling the `Retrieve
            init data API`."
        can_save_card:
          type: boolean
          description:
            When true, display a checkbox in the SDK for card saving with
            this payment method. When false, do not display the checkbox.
        submit_url:
          type: string
          format: uri
          description:
            URL that the frontend must call with POST request to get Click
            to Pay configuration data for the selected payment gateway. For example,
            when the user selects a gateway like DOKU or CSUC this endpoint should
            be triggered to initialize the specific payment flow. The response will
            contain gateway-specific configuration needed to proceed. Refer to the
            'Submit Doku' section in the documentation for more details.
        billing:
          allOf:
            - $ref: "#/components/schemas/Billing"
          description:
            Detailed billing information for the payment method, including
            formatted amounts for display and raw values for processing. Contains
            both the total transaction amount and any applicable fees with their respective
            currency codes and labels.
      required:
        - amount
        - billing
        - can_save_card
        - code
        - currency_code
        - fee
        - fee_description
        - icon
        - icons
        - name
        - submit_url
        - type
    DokuSDKResponse:
      type: object
      properties:
        js_sdk_src:
          type: string
          format: uri
          description:
            URL of doku JavaScript SDK required to initiate the payment
            flow for more info please review these docshttps://developers.doku.com/accept-payment/doku-checkout/integration-guide/frontend-integration
        payment_url:
          type: string
          format: uri
          description: Payment URL needed to initialize doku payment iframe.
        reference_number:
          type: string
          description: The reference number associated with the payment.
        ws_url:
          type: string
          format: uri
          description:
            The WebSocket URL for real-time communication during callback
            process.
      required:
        - js_sdk_src
        - payment_url
        - reference_number
        - ws_url
    ExternalOperation:
      type: object
      properties:
        amount:
          type: string
          readOnly: true
          description: The specific amount for which the operation was performed.
        session_id:
          type: string
          description:
            The session ID of the parent transaction will be included in
            the webhook payload. This session ID is crucial for associating the webhook
            event with the original transaction, allowing for accurate tracking and
            processing.
          readOnly: true
        order_no:
          type: string
          description:
            The 'order_no' field indicates the unique order number of the
            parent transaction. This identifier is crucial for tracking and managing
            the related order within its entire lifecycle.
          readOnly: true
        initiator:
          allOf:
            - $ref: "#/components/schemas/InitiatorUser"
          description:
            If the operation was performed using Basic Auth (and not an
            API Key), this field contains the details of the `initiator` who started
            the operation.
        is_sandbox:
          type: boolean
          title: Is Sandbox?
          description:
            Indicates whether the operation was performed in a test environment
            or not.
        operation:
          enum:
            - capture
            - refund
            - void
          type: string
          description: Identifies the operation that was executed.
          x-spec-enum-id: 6fdf34a272fc404b
          readOnly: true
        pg_code:
          type: string
          description:
            Represents the `pg_code` of the Payment Gateway settings which
            was used to perform the operation.
        pg_response:
          type: object
          additionalProperties: {}
          readOnly: true
          description:
            Contains the raw response from the payment gateway (PG) for
            the operation (`pg_response`). It will always be a valid JSON.
        reference_number:
          type: string
          readOnly: true
          description:
            A unique reference_number assigned by Ottu for the performed
            operation. It's also sent to the PG and can be used as a reconciliation
            parameter.
        source:
          enum:
            - input
            - pg
          type: string
          description:
            Can have one of two values - `input` or `pg`. If `input`, it
            means the operation was performed in an API call triggered by the merchant.
            If `pg`, it means the operation was done on the PG management dashboard,
            and the PG notified Ottu via webhook. The `pg` value will always be notified
            to the webhook, never in an API call.
          x-spec-enum-id: 11ceda8d7147f99f
          readOnly: true
        success:
          type: boolean
          readOnly: true
          description:
            Indicates whether the operation was successful or not (`success=True`
            or `success=False`).
        result:
          enum:
            - success
            - failed
          type: string
          description:
            The result of the operation - whether it was successful or
            not.
          x-spec-enum-id: ce10c9ef1792a8ae
          readOnly: true
        signature:
          type: string
          readOnly: true
          description:
            "Signature Field: A cryptographic hash used to guarantee data
            integrity and authenticity during client-server exchanges. This hash ensures
            that the API payload has not been tampered with, and can only be verified
            by authorized parties."
        timestamp_utc:
          type: string
          format: date-time
          description:
            Specifies the time when the operation was performed, in the
            UTC timezone.
        txn:
          allOf:
            - $ref: "#/components/schemas/ChildPayment"
          readOnly: true
          description:
            Every operation results in the creation of a payment transaction
            (`txn`), which is a child of the payment transaction against which the
            operation is performed. This child transaction holds all the details of
            the operation.
        pg_params:
          allOf:
            - $ref: "#/components/schemas/PGParams"
          readOnly: true
          description:
            "The `pg_params` field contains the details received \nfrom
            the payment gateway callback these details are \nprovided to us by the
            gateway after a user has completed \na payment transaction additionally,
            `pg_params` \ncan include information obtained from an inquiry \nrequest
            made to the payment gateway status check API. \n"
        extra:
          description:
            The extra information for the payment details, which the merchant
            has sent it in key value form.
      required:
        - amount
        - operation
        - order_no
        - pg_params
        - pg_response
        - reference_number
        - result
        - session_id
        - signature
        - source
        - success
        - timestamp_utc
        - txn
    ExtraInner:
      type: object
      description: |-
        Serializer for extra data aka dynamic fields.
        Extra data can accept any value by default. However,
        if the merchant wants to enforce a specific type, they can
        use the plugins.Field class to do so. All CUSTOM fields are
        validated inside extra field.

        Implementation:
            - requires to have a config property in the parent
            serializer which has to return a PluginConfig instance,
            to which fields are attached.
      properties:
        remarks:
          type: string
        invoice_no:
          type: string
          title: invoice no.
        payment_category_name:
          type: string
        payment_category_amount:
          type: string
        month:
          enum:
            - january
            - february
          type: string
          description: |-
            * `january` - January
            * `february` - February
