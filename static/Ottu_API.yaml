      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageNotification"
            examples:
              SMS:
                value:
                  session_id: <add `session_id` here>
                  channels:
                    - sms
              Email:
                value:
                  order_no: <add `order_no` here>
                  channels:
                    - email
                summary: Email
              WhatsApp&SMS:
                value:
                  session_id: <add `session_id` here>
                  channels:
                    - sms
                    - whatsapp
                summary: WhatsApp & SMS Notifications
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/MessageNotification"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/MessageNotification"
        required: true
      security:
        - basicAuth: []
        - tokenAuth: []
      responses:
