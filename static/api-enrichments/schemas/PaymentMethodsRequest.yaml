# Overrides for: components/schemas/PaymentMethodsRequest
# Request body for POST /pbl/v2/payment-methods/

_example:
  plugin: payment_request
  operation: purchase
  currencies:
    - KWD
  type: sandbox
  tags:
    - demo

properties:
  pg_names:
    description: |
      When provided, the payment methods will be narrowed down to those that support the specified payment gateway name. Example: `["kpay", "mpgs"]`.
