# Overrides for: components/schemas/CardAcceptanceCriteria
# Used by CheckoutPOSTRequest.card_acceptance_criteria and related request schemas.

properties:
  min_expiry_time:
    description: |
      Specifies the minimum required validity period, in days, for a card to be eligible for payment. If set to 30 days, for example, cards set to expire within the next month would be declined. Additionally, it defaults to 30 days when the `payment_type` is `auto_debit`. If any other payment type is selected, no default value is set.
