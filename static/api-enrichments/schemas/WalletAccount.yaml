# Overrides for: components/schemas/WalletAccount
# Response object for wallet accounts list and detail

properties:
  account_uuid:
    description: |
      Unique identifier for the wallet account. Stable across the account's lifetime; used as the primary key in ledger and operation queries.
  customer_id:
    description: |
      The customer this wallet belongs to. Matches the `customer_id` you pass when creating Checkout sessions.
  currency:
    description: |
      ISO 4217 currency code of this wallet. A customer who transacts in multiple currencies has one wallet per currency.
  balance:
    description: |
      Confirmed balance available for the customer to spend at checkout. Excludes amounts currently held by active reservations.
  status:
    description: |
      Account status. `active` accepts new credits and reservations; `suspended` rejects new entries (existing balance remains queryable).
  created_at:
    description: |
      ISO 8601 timestamp of when this account was first created (i.e., the first credit landed).
