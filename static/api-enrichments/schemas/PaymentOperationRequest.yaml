# Overrides for: the request body schema of POST /b/pbl/v2/operation/
# Adds the destination field used by refund-to-wallet.
#
# NOTE: The exact schema name in Ottu_API.yaml may differ. If after Connect ships
# subticket 150893 the actual schema is named differently (e.g.,
# OperationRequest, PaymentOperationCreate), rename this file to match.

properties:
  destination:
    description: |
      Target for refund proceeds. Applies only when `operation` is `refund`; ignored for other operation types.

      - `"gateway"` (default) — funds returned via the original payment gateway.
      - `"wallet"` — funds credited to the customer's wallet balance for use at future checkouts.

      When set to `"wallet"`, a wallet account is created automatically if one doesn't already exist for the (merchant, customer, currency) combination. The credit is recorded as an immutable ledger entry linked to the original payment session.

      Cross-currency credits are not supported — the refund currency must match the original payment currency.
