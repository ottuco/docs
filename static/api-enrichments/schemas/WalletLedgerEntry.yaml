# Overrides for: components/schemas/WalletLedgerEntry
# Single immutable ledger row

properties:
  entry_id:
    description: |
      Unique identifier for this ledger entry. Entries are immutable — to correct an error, issue an opposing entry rather than modifying this one.
  operation_id:
    description: |
      ID of the wallet operation that produced this entry. One operation can produce multiple entries (e.g., a reserve operation produces a reservation entry, then a commit operation produces a debit entry that closes the reservation).
  type:
    description: |
      Entry type. `credit` adds funds; `debit` removes funds; `reservation` holds funds without yet committing them.
  amount:
    description: |
      Signed amount in the wallet's currency. Credits are positive; debits are negative.
  balance_after:
    description: |
      The account's balance immediately after this entry was applied. Reservations do not affect `balance_after` — they are tracked separately.
  funding_source_type:
    description: |
      For credits only. One of `refund_from_payment`, `manual_adjustment`, `promo`, `goodwill`. Used for reporting and reconciliation.
  linked_session_id:
    description: |
      The Ottu Checkout session that originated this entry, if applicable. Refund-to-wallet credits reference the original payment session.
  created_at:
    description: |
      ISO 8601 timestamp when this entry was recorded.
