_description: >-
  Normalized payment gateway response parameters. Ottu maps varied PG responses
  into these fixed fields, so you can interpret payment results consistently
  regardless of which gateway processed the transaction. Use these fields instead
  of parsing the raw `gateway_response` object.

properties:
  auth_code:
    description: Authorization code returned by the payment gateway for the transaction.
  card_type:
    description: The type of card used (e.g., "credit", "debit", "prepaid").
  card_holder:
    description: Full name of the cardholder as provided by the payment gateway.
  cardholder_email:
    description: Email address of the cardholder, if provided by the payment gateway.
  card_expiry_month:
    description: Expiry month of the card (e.g., "01", "12").
  card_expiry_year:
    description: Expiry year of the card (e.g., "2025", "25").
  full_card_expiry:
    description: Full card expiry in MM/YY or MM/YYYY format, as returned by the gateway.
  card_number:
    description: Masked card number (PAN) used for the transaction (e.g., "411111******1111").
  card_issuer:
    description: The issuing bank or financial institution of the card.
  ref:
    description: Gateway-specific reference identifier for the transaction.
  result:
    description: The normalized transaction result from the payment gateway (e.g., "CAPTURED", "APPROVED", "DECLINED").
  track_id:
    description: Tracking identifier assigned by the payment gateway for reconciliation.
  post_date:
    description: The date the transaction was posted/settled by the payment gateway.
  transaction_id:
    description: Unique transaction identifier assigned by the payment gateway.
  payment_id:
    description: Payment identifier from the payment gateway, used for tracking and reconciliation.
  pg_message:
    description: Human-readable message from the payment gateway describing the transaction outcome.
  receipt_no:
    description: Receipt number generated by the payment gateway for the transaction.
  transaction_no:
    description: Transaction number assigned by the gateway, often different from transaction_id.
  decision:
    description: The gateway's final decision on the transaction (e.g., "ACCEPT", "REJECT", "REVIEW").
  card_expiry:
    description: Card expiry date in a gateway-specific format.
  card_details:
    description: Additional card details object as returned by the payment gateway.
  dcc_payer_amount:
    description: The amount in the payer's currency when Dynamic Currency Conversion (DCC) is applied.
  dcc_payer_currency:
    description: The payer's local currency code when DCC is applied (e.g., "USD", "EUR").
  dcc_payer_exchange_rate:
    description: The exchange rate applied for DCC conversion.
  rrn:
    description: Retrieval Reference Number — a unique identifier used for transaction lookups and dispute resolution.
