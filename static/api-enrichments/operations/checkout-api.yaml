# Enrichments for tag: "Checkout API"
# Operations: create, retrieve, update, upload attachment

operations:

  create_payment_transaction_checkout:
    permissions:
      - $perm:api_key_admin
      - $perm:basic_auth_create_checkout
    description_append: |
      :::info
      The PUT operation cannot be used if the user does not have permission
      to use the previously defined payment gateway [code]({{apiBaseUrl}}/payments/payment-methods/) on the transaction.
      :::

  retrieve_payment_transaction_checkout:
    permissions:
      - $perm:api_key_admin
      - $perm:basic_auth_view_checkout
    parameters:
      session_id:
        example: b17b883a03eaf1837a21b47e8b78c49f6ecec917

  full_update_payment_transaction_checkout:
    permissions:
      - $perm:api_key_admin
      - $perm:basic_auth_update_checkout
    parameters:
      session_id:
        example: b17b883a03eaf1837a21b47e8b78c49f6ecec917
    description_append: |
      :::info
      For PATCH, updates can be performed as long as the payment gateway
      codes are not updated. PUT requires permission for the existing `pg_code`.
      :::

  partial_update_payment_transaction_checkout:
    parameters:
      session_id:
        example: b17b883a03eaf1837a21b47e8b78c49f6ecec917

  upload_attachment:
    permissions:
      - $perm:api_key_admin
      - auth_method: "[Basic Auth]({{apiBaseUrl}}/getting-started/authentication/#basic-auth)"
        permissions: "`Can add payment requests` or `Can add e-commerce payments`"
