# Enrichments for tags: "Payment Operations"
# Operations: refund, capture, void, cancel, expire, delete, inquiry, auto-debit, cash, native payments

operations:

  public_operations:
    permissions:
      - $perm:api_key_admin
      - $perm:basic_auth_operations
    description_replace: |
      Perform operations on existing payment transactions. Supports `refund`, `capture`, `void`, `cancel`, `expire`, and `delete`.

      Use `session_id` or `order_no` to identify the target transaction. For `refund` and `capture`, specify `amount` (defaults to full/remaining amount). For `void`, always applies to the full amount.

      Refunds can target the **original payment gateway** (default) or the **customer's wallet** by setting `destination: "wallet"`. See [Refund to Wallet]({{apiBaseUrl}}/operations#refund-to-wallet) and the [Wallet integration page]({{apiBaseUrl}}/payments/wallet/) for full behavior.

      Include `Tracking-Key` header on external operations to prevent duplicates and retrieve status.

  inquiry:
    permissions:
      - $perm:api_key_admin
      - $perm:basic_auth_inquiry
    description_replace: |
      Check the status of a payment transaction. For `pending`, `attempted`, `failed`, or `expired` states, Ottu queries the payment gateway for the latest status. For `paid` or `authorized` states, returns the current status immediately.

      Requires at least one identifier: `session_id` or `order_no`.

  # ── Idempotency-Key on direct-charge endpoints (#144299) ──
  # Shared note appended to every server-to-server charge endpoint so the
  # interactive API reference documents the replay-protection contract. The
  # `&idempotency_note` anchor keeps the wording identical across surfaces.
  auto_debit:
    permissions:
      - $perm:api_key_admin
      - $perm:basic_auth_auto_debit
    description_append: &idempotency_note |-
      **Idempotency.** Pass an `Idempotency-Key` request header to make this charge safe to retry. If the same key was already recorded on the transaction by a previous **successful** charge, the request is rejected with `409 Conflict` **before any charge is attempted** — so a network retry can never double-charge the customer. The key is stored only after a successful charge, so retrying a **failed** charge with the same key is still allowed. Omitting the header preserves the original, non-idempotent behavior. See [Native Payments → Idempotency]({{apiBaseUrl}}/payments/native-payments#idempotency) for the full contract.

  auto_debit_2:
    permissions:
      - $perm:api_key_admin
      - $perm:basic_auth_auto_debit
    description_append: *idempotency_note

  apple_native_payment:
    permissions:
      - $perm:api_key_admin
      - $perm:basic_auth_native_payment
    description_append: *idempotency_note

  google_native_payment:
    permissions:
      - $perm:api_key_admin
      - $perm:basic_auth_native_payment
    description_append: *idempotency_note

  wallet_native_payment:
    permissions:
      - $perm:api_key_admin
      - $perm:basic_auth_native_payment
    description_append: *idempotency_note

  cash_payment_acknowledgement:
    permissions:
      - $perm:api_key_admin
    description_append: *idempotency_note

  cash_payment_acknowledgement_2:
    permissions:
      - $perm:api_key_admin
    description_append: *idempotency_note
